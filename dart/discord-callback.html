<!DOCTYPE html>
<html lang="pl">
<head><meta charset="UTF-8"><title>Discord Callback</title></head>
<body>
<script>
const hash=window.location.hash.substring(1);
const params=new URLSearchParams(hash);
const token=params.get('access_token');
if(token){ localStorage.setItem('typer_token',token); window.location.href='/dart/index.html#access_token='+token; }
else{ alert('Błąd logowania Discord'); }
</script>
</body>
</html>
