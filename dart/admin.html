<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚙️ Admin Typer Dart</title>
  <style>
    body { background:#0f0f0f; color:#fff; font-family:sans-serif; margin:0; padding:0; }
    header { background:#c40000; padding:12px; text-align:center; font-size:22px; }
    .container { padding:12px; }
    input,button { width:100%; padding:10px; margin:6px 0; border:none; border-radius:8px; font-size:16px; }
    button { background:#c40000; color:#fff; font-weight:bold; cursor:pointer; }
    .card { background:#1a1a1a; padding:10px; margin-top:12px; border-radius:10px; }
    .user { padding:6px; background:#111; margin-top:6px; border-radius:6px; }
  </style>
</head>
<body>

<header>⚙️ Admin Typer Dart</header>

<div id="loginBox" class="container"></div>

<div id="adminApp" class="container"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwLOFahdAvzVw7WDL1CSO8orf1euEABlLcpHSs-yRGQvbLeCPF7FwIXh8M1p4kN5U9F/exec";
const ADMIN_ID = "1192231948173709453"; // wpisz swoje

let user = JSON.parse(localStorage.getItem("dc_user")) || null;

function showLogin() {
  loginBox.innerHTML = `<button onclick="loginDiscord()" style="background:#5865f2;color:#fff;padding:10px;width:100%;border-radius:8px;font-size:16px;">Zaloguj Discord ADMIN</button>`;
}

function loginDiscord(){
  const CLIENT_ID = "1483233223013302424";
  const REDIRECT = encodeURIComponent("https://dcranking.pl/dart/discord-callback.html");
  location.href = `https://discord.com/oauth2/authorize?client_id=${CLIENT_ID}&response_type=token&scope=identify&redirect_uri=${REDIRECT}`;
}

function loadAdmin(){
  if(!user || user.id !== ADMIN_ID){
    adminApp.innerHTML = "<h3>Brak dostępu</h3>";
    return;
  }

  adminApp.innerHTML = `
    <h3>Dodaj mecz</h3>
    <input id="match" placeholder="np. Littler vs Ratajski">
    <input id="question" placeholder="Pytanie">
    <input id="opt1" placeholder="Opcja 1">
    <input id="opt2" placeholder="Opcja 2">
    <input id="opt3" placeholder="Opcja 3">
    <input id="opt4" placeholder="Opcja 4">
    <input id="deadline" type="datetime-local">
    <input id="points" type="number" placeholder="Punkty">
    <button onclick="addQ()">Dodaj mecz</button>

    <div class="card" id="setCorrectArea"></div>

    <h3>Użytkownicy</h3><div id="usersArea"></div>
  `;

  fetch(API).then(r=>r.json()).then(data=>{
    renderSetCorrect(data.questions);
    renderUsers(data.users, data.answers, data.questions);
  });
}

function addQ(){
  fetch(API,{
    method:"POST",
    headers:{"Content-Type":"text/plain"},
    body:JSON.stringify({
      action:"addQuestion",
      match:match.value,
      question:question.value,
      options:[opt1.value,opt2.value,opt3.value,opt4.value],
      deadline:new Date(deadline.value).toISOString(),
      points:points.value
    })
  }).then(()=>location.reload());
}

function renderSetCorrect(qs){
  let html="";
  qs.forEach(q=>{
    html += `
      <div class="card">
        <b>${q.match}</b><br>${q.question}
        ${q.options.map(o=>`<button onclick="setCorrect(${q.id},'${o}')">${o}</button>`).join("")}
        <div>Aktualna: ${q.correct || "brak"}</div>
      </div>
    `;
  });
  setCorrectArea.innerHTML = html;
}

function setCorrect(qid,val){
  fetch(API,{
    method:"POST",
    headers:{"Content-Type":"text/plain"},
    body:JSON.stringify({
      action:"setCorrect",
      qid,
      correct:val
    })
  }).then(()=>alert("Ustawiono!"));
}

function renderUsers(users, answers, qs){
  let html="";
  users.forEach(u=>{
    const userAnswers = answers.filter(a=>a.userId == u.id);
    html += `<div class="user">${u.username} - typów: ${userAnswers.length}/${qs.length}</div>`;
  });
  usersArea.innerHTML = html;
}

if(!user) showLogin();
else loadAdmin();
</script>

</body>
</html>
