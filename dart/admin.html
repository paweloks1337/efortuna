<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚙️ Admin Dart</title>
  <style>body{background:#000;color:#ffd700;font:16px Arial;padding:20px;margin:0;}button{background:#ffd700;color:#000;border:0;padding:15px;margin:10px 0;border-radius:8px;font-size:16px;cursor:pointer;width:100%;}form input{padding:12px;margin:5px 0;width:100%;background:#111;color:#ffd700;border:1px solid #ffd700;border-radius:5px;font-size:16px;}#status{padding:20px;text-align:center;font-size:18px;}</style>
</head>
<body>
  <div id="login">
    <h1>⚙️ Admin Dart</h1>
    <button onclick="loginDiscord()">Zaloguj Discord</button>
  </div>
  <div id="panel" style="display:none;">
    <h1>Admin Panel</h1>
    <form id="form">
      <input id="match" placeholder="Mecz (Littler vs Humphries)">
      <input id="question" placeholder="Pytanie (Kto wygra?)">
      <input id="opt1" placeholder="Opcja 1: Littler">
      <input id="opt2" placeholder="Opcja 2: Remis">
      <input id="opt3" placeholder="Opcja 3: Humphries">
      <input id="deadline" type="datetime-local">
      <button type="submit">➕ DODAJ MECZ</button>
    </form>
    <div id="status">Kliknij login</div>
    <div id="matches"></div>
  </div>

  <script>
    const CLIENT_ID = '1483233223013302424';
    const API_URL = 'https://script.google.com/macros/s/AKfycbwm0HXWnKISrf86bHacY6NmoHtUPIoJROzgpoxbUhKZZYAAAFdAoIowz5dQh3Hbu3WKWQ/exec';
    const ADMIN_ID = '1192231948173709453';
    let user = JSON.parse(localStorage.getItem('dc_user') || 'null');

    // ✅ POPRAWNA FUNKCJA LOGIN
    function loginDiscord() {
      localStorage.setItem('login_from', 'admin.html');
      const REDIRECT = encodeURIComponent('https://dcranking.pl/dart/discord-callback.html');
      window.location.href = `https://discord.com/oauth2/authorize?client_id=${CLIENT_ID}&response_type=token&scope=identify&redirect_uri=${REDIRECT}`;
    }

    async function loadData() {
      try {
        document.getElementById('status').innerHTML = '🔄 Ładowanie...';
        const res = await fetch(API_URL);
        const data = await res.json();
        showMatches(data.questions);
        document.getElementById('status').innerHTML = `✅ ${data.questions.length} meczów`;
      } catch(e) {
        document.getElementById('status').innerHTML = '❌ Błąd: ' + e.message;
      }
    }

    function showMatches(questions) {
      let html = '';
      questions.forEach(q => {
        html += `<div style="background:#111;padding:15px;margin:15px 0;border-radius:8px;">
          <strong>${q.match}</strong> | Typów: ${q.participants}<br>
          ${q.question}<br>
          <select onchange="setCorrect(${q.id},this.value)" style="width:100%;padding:10px;margin-top:10px;">
            <option>${q.correct !== '' ? q.options[q.correct] : 'USTAW POPRAWNĄ'}</option>
            ${q.options.map((o,i)=>`<option value="${i}">${o}</option>`).join('')}
          </select>
        </div>`;
      });
      document.getElementById('matches').innerHTML = html || 'Brak meczów - dodaj pierwszy!';
    }

    async function setCorrect(id, correct) {
      if(correct === '') return;
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({action: 'setCorrect', qId: parseInt(id), correct: parseInt(correct)})
        });
        const r = await res.json();
        if(r.success) {
          alert('✅ Poprawna ustawiona!');
          loadData();
        }
      } catch(e) {
        alert('❌ Błąd: ' + e.message);
      }
    }

    document.getElementById('form').onsubmit = async e => {
      e.preventDefault();
      try {
        const options = [];
        const opt1 = document.getElementById('opt1').value.trim();
        const opt2 = document.getElementById('opt2').value.trim();
        const opt3 = document.getElementById('opt3').value.trim();
        
        if(opt1) options.push(opt1);
        if(opt2) options.push(opt2);
        if(opt3) options.push(opt3);
        
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            action: 'addMatch',
            match: document.getElementById('match').value.trim(),
            question: document.getElementById('question').value.trim(),
            options: options,
            deadline: document.getElementById('deadline').value
          })
        });
        
        const r = await res.json();
        if(r.success) {
          alert('✅ Mecz dodany!');
          document.getElementById('form').reset();
          loadData();
        }
      } catch(e) {
        alert('❌ Błąd: ' + e.message);
      }
    };

    // START
    if(window.location.hash.includes('access_token') && !user) {
      // Callback processing już w callback.html
      setTimeout(() => location.reload(), 1000);
    } else if(user && user.id === ADMIN_ID) {
      document.getElementById('login').style.display = 'none';
      document.getElementById('panel').style.display = 'block';
      loadData();
    } else {
      document.getElementById('login').style.display = 'block';
    }
  </script>
</body>
</html>
