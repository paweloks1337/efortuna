<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔐 Panel Admin - Jasnowidz Fortuny</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { background: linear-gradient(135deg, #111827 0%, #1f2937 100%); color:white; font-family: system-ui,sans-serif; }
.card { background: rgba(31,41,55,0.95); backdrop-filter:blur(10px); border:1px solid rgba(251,191,36,0.3); }
.option { border:2px solid #374151; padding:1rem; border-radius:1rem; margin-bottom:0.5rem; cursor:pointer; }
.option.correct { background: rgba(34,197,94,0.3); border-color:#10B981;}
.option.wrong { background: rgba(239,68,68,0.3); border-color:#EF4444;}
</style>
</head>
<body class="min-h-screen p-4 md:p-8">

<!-- LOGIN ADMIN -->
<div id="adminLoginScreen" class="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center">
  <div class="card p-10 rounded-3xl max-w-md w-full text-center">
    <div class="text-4xl mb-8">🔐</div>
    <h2 class="text-3xl font-bold mb-8">Panel Admin</h2>
    <input id="adminPass" type="password" placeholder="Wpisz hasło admina" class="w-full p-5 rounded-2xl border-2 border-yellow-500 bg-gray-900 text-white text-xl mb-6 text-center focus:outline-none">
    <button onclick="checkAdmin()" class="w-full bg-gradient-to-r from-yellow-500 to-yellow-600 hover:from-yellow-400 text-black py-5 px-8 rounded-2xl font-bold text-xl shadow-2xl hover:shadow-3xl transition-all">
      WEJDŹ DO PANELU
    </button>
  </div>
</div>

<!-- PANEL ADMIN -->
<div id="adminPanel" class="hidden max-w-5xl mx-auto pt-16 pb-16">
  <div class="card p-10 rounded-3xl mb-12 shadow-2xl">
    <h1 class="text-4xl font-bold text-center mb-12">⚙️ PANEL ADMINISTRATORA</h1>

    <!-- DODAJ NOWE PYTANIE -->
    <div class="mb-12 p-8 bg-gradient-to-r from-gray-800 to-gray-900 rounded-3xl">
      <h3 class="text-2xl font-bold mb-6 text-center">➕ Dodaj nowy mecz</h3>
      <input id="match" placeholder="Np. Littler vs Ratajski" class="w-full p-4 rounded-xl border-2 border-yellow-400 bg-gray-900 text-white mb-4 focus:outline-none">
      <input id="question" placeholder="Np. Kto wygra?" class="w-full p-4 rounded-xl border-2 border-yellow-400 bg-gray-900 text-white mb-4 focus:outline-none">
      <div class="grid grid-cols-2 gap-4 mb-4">
        <input id="optA" placeholder="Opcja A" class="p-3 rounded-xl border-2 border-gray-600 bg-gray-900 text-white focus:border-yellow-400">
        <input id="optB" placeholder="Opcja B" class="p-3 rounded-xl border-2 border-gray-600 bg-gray-900 text-white focus:border-yellow-400">
      </div>
      <div class="grid grid-cols-2 gap-4 mb-4">
        <input id="optC" placeholder="Opcja C (opcjonalne)" class="p-3 rounded-xl border-2 border-gray-600 bg-gray-900 text-white focus:border-yellow-400">
        <input id="optD" placeholder="Opcja D (opcjonalne)" class="p-3 rounded-xl border-2 border-gray-600 bg-gray-900 text-white focus:border-yellow-400">
      </div>
      <input id="deadline" type="datetime-local" class="w-full p-4 rounded-xl border-2 border-gray-600 bg-gray-900 text-white mb-4 focus:border-yellow-400">
      <input id="points" type="number" placeholder="Punkty za poprawną odpowiedź" class="w-full p-4 rounded-xl border-2 border-gray-600 bg-gray-900 text-white mb-4 focus:border-yellow-400">
      <button onclick="addQuestion()" class="w-full bg-gradient-to-r from-emerald-500 to-emerald-600 hover:from-emerald-400 text-white py-4 px-8 rounded-2xl font-bold text-xl shadow-xl hover:shadow-2xl transition-all">
        ➕ Dodaj mecz
      </button>
    </div>

    <!-- LISTA PYTAŃ -->
    <div id="questionsList" class="space-y-6 max-h-96 overflow-y-auto"></div>

    <div class="text-center mt-8">
      <button onclick="logout()" class="bg-gradient-to-r from-gray-700 to-gray-600 hover:from-gray-600 text-white py-4 px-12 rounded-2xl font-bold text-xl shadow-xl hover:shadow-2xl transition-all">
        🚪 Wyloguj
      </button>
    </div>
  </div>
</div>

<script>
const ADMIN_PASS = 'zmienToNaCosTrudnego123!';
const BACKEND = 'https://script.google.com/macros/s/AKfycbzMMcBHZaFYfslqMdBDW0u3T6uADWKDIJVrAvCfl9362ChLHhQ4pwqjRqW1G5vlU1JMBQ/exec';

let questions=[];

function checkAdmin(){
  if(document.getElementById('adminPass').value===ADMIN_PASS){
    document.getElementById('adminLoginScreen').classList.add('hidden');
    document.getElementById('adminPanel').classList.remove('hidden');
    loadQuestions();
  } else alert('❌ Błędne hasło!');
}

async function addQuestion(){
  const q={
    match: document.getElementById('match').value,
    question: document.getElementById('question').value,
    options:[
      document.getElementById('optA').value,
      document.getElementById('optB').value,
      document.getElementById('optC').value,
      document.getElementById('optD').value
    ].filter(o=>o),
    deadline: document.getElementById('deadline').value,
    points: Number(document.getElementById('points').value)
  };
  if(!q.match || !q.question || q.options.length<2 || !q.deadline){ alert('Wypełnij wszystkie pola!'); return; }

  await fetch(BACKEND,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({action:'addQuestion', ...q})
  });
  alert('Mecz dodany ✅');
  loadQuestions();
}

async function loadQuestions(){
  const res=await fetch(`${BACKEND}?type=all`);
  const data=await res.json();
  questions=data.questions;
  renderQuestions();
}

function renderQuestions(){
  const container=document.getElementById('questionsList');
  container.innerHTML=questions.map((q,i)=>`
    <div class="card p-4 rounded-2xl">
      <div class="font-bold mb-2">${q.match} - ${q.question}</div>
      <div class="flex flex-col space-y-2">
        ${q.options.map((opt,j)=>`<div class="option ${q.correct===j?'correct':''}" onclick="setCorrect(${i},${j})">${String.fromCharCode(65+j)}: ${opt}</div>`).join('')}
      </div>
    </div>
  `).join('');
}

async function setCorrect(qid,optid){
  await fetch(BACKEND,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({action:'setCorrect', qid, correct:optid})
  });
  loadQuestions();
}

function logout(){
  document.getElementById('adminPanel').classList.add('hidden');
  document.getElementById('adminLoginScreen').classList.remove('hidden');
  document.getElementById('adminPass').value='';
}
</script>
</body>
</html>
