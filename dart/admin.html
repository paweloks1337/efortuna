<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚙️ Panel Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{background:#111827;color:white;font-family:system-ui,sans-serif}
.card{background:rgba(31,41,55,0.95);backdrop-filter:blur(10px);border:1px solid rgba(251,191,36,0.3);}
</style>
</head>
<body class="p-4">

<div class="max-w-5xl mx-auto">
<h1 class="text-4xl font-bold text-center mb-8">⚙️ Panel Admin</h1>

<!-- Dodaj mecz -->
<div class="card p-6 mb-8 rounded-2xl">
<h2 class="text-2xl font-bold mb-4">➕ Dodaj mecz</h2>
<input id="adminQ" placeholder="Np. Littler vs Ratajski" class="w-full p-4 mb-2 rounded-xl bg-gray-900 border-2 border-yellow-400 text-white">
<input id="optA" placeholder="Opcja A" class="w-full p-4 mb-2 rounded-xl bg-gray-900 border-2 text-white">
<input id="optB" placeholder="Opcja B" class="w-full p-4 mb-2 rounded-xl bg-gray-900 border-2 text-white">
<input id="points" type="number" placeholder="Punkty" class="w-full p-4 mb-2 rounded-xl bg-gray-900 border-2 text-white">
<input id="deadline" type="datetime-local" class="w-full p-4 mb-2 rounded-xl bg-gray-900 border-2 text-white">
<button onclick="addQuestion()" class="w-full bg-gradient-to-r from-emerald-500 to-emerald-600 py-4 rounded-xl font-bold">Dodaj mecz</button>
</div>

<!-- Lista pytań -->
<div id="questionsList" class="space-y-4 mb-8"></div>

<!-- Ranking -->
<div class="card p-6 rounded-2xl mb-8">
<h2 class="text-2xl font-bold mb-4">🏆 Ranking</h2>
<table class="w-full text-white">
<thead><tr><th class="text-left">Gracz</th><th>Punkty</th></tr></thead>
<tbody id="rankingList"></tbody>
</table>
</div>

<script>
const SHEET_API = 'https://script.google.com/macros/s/AKfycbzMMcBHZaFYfslqMdBDW0u3T6uADWKDIJVrAvCfl9362ChLHhQ4pwqjRqW1G5vlU1JMBQ/exec';
let questions=[], answers={}, users=[];

async function loadAll(){
  const res = await fetch(SHEET_API+'?type=all');
  const data = await res.json();
  questions = data.questions;
  answers = data.answers;
  users = data.users;
  renderQuestions();
  generateRanking();
}

function renderQuestions(){
  const container = document.getElementById('questionsList');
  container.innerHTML = questions.map((q,i)=>`
    <div class="card p-4 rounded-xl">
      <b>${q.question}</b> (${q.points||1} pkt)<br>
      Opcje: ${q.options.join(', ')}<br>
      Poprawna: <input type="number" min="0" max="${q.options.length-1}" value="${q.correct==null?'':q.correct}" onchange="setCorrect(${i},this.value)">
    </div>
  `).join('');
}

function setCorrect(i,val){
  fetch(SHEET_API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'setCorrect',qid:i,correct:Number(val)})}).then(()=>loadAll());
}

function addQuestion(){
  const newQ = {
    question:document.getElementById('adminQ').value,
    options:[document.getElementById('optA').value,document.getElementById('optB').value],
    points:Number(document.getElementById('points').value)||1,
    deadline:document.getElementById('deadline').value
  };
  fetch(SHEET_API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'addQuestion',...newQ})}).then(()=>loadAll());
}

function generateRanking(){
  const ranking = users.map(u=>{
    let pts=0;
    questions.forEach((q,i)=>{
      if(q.correct!=null && answers[u.id] && answers[u.id][i]==q.correct) pts+=q.points||1;
    });
    return {username:u.username, points:pts};
  }).sort((a,b)=>b.points-a.points);
  const tbody = document.getElementById('rankingList');
  tbody.innerHTML = ranking.map(r=>`<tr><td>${r.username}</td><td>${r.points}</td></tr>`).join('');
}

loadAll();
</script>
</body>
</html>
