<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 Typer Dart - Panel Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { background: linear-gradient(135deg,#1f1f1f 0%,#2b2b2b 100%); color:white; font-family:system-ui,sans-serif; }
.card { background: rgba(31, 41, 55, 0.95); backdrop-filter: blur(10px); border:1px solid rgba(239,68,68,0.3); }
input, button { font-family: inherit; }
</style>
</head>
<body class="min-h-screen p-4 md:p-8">

<div class="max-w-4xl mx-auto">
  <h1 class="text-4xl font-bold mb-8 text-center text-red-500">🏆 Typer Dart - Panel Admin</h1>

  <div class="card p-6 rounded-2xl mb-12">
    <h2 class="text-2xl font-bold mb-4 text-red-400">➕ Dodaj nowy mecz</h2>
    <input id="match" placeholder="Np. Littler vs Ratajski" class="w-full p-3 rounded-xl mb-4 border border-gray-600 bg-gray-900 text-white">
    <input id="question" placeholder="Np. Kto wygra?" class="w-full p-3 rounded-xl mb-4 border border-gray-600 bg-gray-900 text-white">
    <div class="grid grid-cols-2 gap-4 mb-4">
      <input id="optA" placeholder="Opcja 1" class="p-3 rounded-xl border border-gray-600 bg-gray-900 text-white">
      <input id="optB" placeholder="Opcja 2" class="p-3 rounded-xl border border-gray-600 bg-gray-900 text-white">
      <input id="optC" placeholder="Opcja 3 (opcjonalnie)" class="p-3 rounded-xl border border-gray-600 bg-gray-900 text-white">
      <input id="optD" placeholder="Opcja 4 (opcjonalnie)" class="p-3 rounded-xl border border-gray-600 bg-gray-900 text-white">
    </div>
    <input id="points" type="number" placeholder="Punkty za poprawną odpowiedź" class="w-full p-3 rounded-xl mb-4 border border-gray-600 bg-gray-900 text-white">
    <input id="deadline" type="datetime-local" class="w-full p-3 rounded-xl mb-4 border border-gray-600 bg-gray-900 text-white">
    <button onclick="addQuestion()" class="w-full py-3 bg-gradient-to-r from-red-500 to-red-600 hover:from-red-400 rounded-xl font-bold text-lg shadow-lg hover:shadow-xl transition-all">➕ Dodaj mecz</button>
  </div>

  <div id="questionsList" class="space-y-4"></div>
</div>

<script>
const SHEET_API = 'https://script.google.com/macros/s/AKfycbzMMcBHZaFYfslqMdBDW0u3T6uADWKDIJVrAvCfl9362ChLHhQ4pwqjRqW1G5vlU1JMBQ/exec';
let questions = [];

// Pobierz listę pytań
async function loadQuestions() {
  try {
    const res = await fetch(`${SHEET_API}?type=all`);
    const data = await res.json();
    questions = data.questions || [];
    renderQuestions();
  } catch(e){
    console.error("Błąd ładowania pytań:", e);
    alert("Nie udało się pobrać pytań!");
  }
}

// Wyświetl pytania
function renderQuestions() {
  const container = document.getElementById('questionsList');
  container.innerHTML = '';
  questions.forEach((q,i) => {
    const now = new Date();
    const deadline = new Date(q.deadline);
    const expired = now > deadline;
    const card = document.createElement('div');
    card.className = 'card p-4 rounded-2xl';
    card.innerHTML = `
      <h3 class="text-xl font-bold mb-2">${q.match}</h3>
      <p class="mb-2">${q.question}</p>
      <div class="flex flex-wrap gap-2 mb-2">${q.options.map((o,j)=>`<span class="px-2 py-1 border rounded-xl ${expired ? 'bg-gray-700 text-gray-300' : 'bg-gray-900 text-white'}">[${j+1}] ${o}</span>`).join('')}</div>
      <div class="text-sm text-gray-300">Deadline: ${new Date(q.deadline).toLocaleString()} | Punkty: ${q.points}</div>
    `;
    container.appendChild(card);
  });
}

// Dodaj pytanie
async function addQuestion(){
  const newQ = {
    match: document.getElementById('match').value,
    question: document.getElementById('question').value,
    options: [
      document.getElementById('optA').value,
      document.getElementById('optB').value,
      document.getElementById('optC').value,
      document.getElementById('optD').value
    ].filter(o=>o),
    points: parseInt(document.getElementById('points').value),
    deadline: document.getElementById('deadline').value
  };

  if(!newQ.match || !newQ.question || newQ.options.length<2 || !newQ.points || !newQ.deadline){
    alert("Wypełnij wszystkie pola!");
    return;
  }

  try {
    const res = await fetch(SHEET_API, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({action:"addQuestion", ...newQ})
    });
    const data = await res.json();
    console.log("Odpowiedź API:", data);
    if(data.error) alert("Błąd: " + data.error);
    else{
      alert("Pytanie dodane!");
      loadQuestions();
      // Czyść pola
      document.getElementById('match').value='';
      document.getElementById('question').value='';
      ['optA','optB','optC','optD','points','deadline'].forEach(id=>document.getElementById(id).value='');
    }
  } catch(e){
    console.error("Błąd fetch:", e);
    alert("Nie udało się dodać pytania!");
  }
}

// Od razu załaduj pytania przy starcie
loadQuestions();
</script>
</body>
</html>
