<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔮 Typer Darta</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { background: linear-gradient(135deg, #111827, #1f2937); color:white; font-family: system-ui, sans-serif; }
.card { background: rgba(31,41,55,0.95); backdrop-filter: blur(10px); border:1px solid rgba(251,191,36,0.3); }
.correct { background: rgba(34,197,94,0.3)!important; border-color:#10B981!important; }
.wrong { background: rgba(239,68,68,0.3)!important; border-color:#EF4444!important; }
.waiting { background: rgba(107,114,128,0.3)!important; border-color:#6B7280!important; }
.deadline-active { color: #F59E0B; font-weight:700; }
.deadline-expired { color:#6B7280; }
</style>
</head>
<body class="min-h-screen p-4 md:p-8">

<!-- LOGIN -->
<div id="loginScreen" class="max-w-md mx-auto mt-16">
  <div class="card p-8 rounded-2xl shadow-2xl text-center">
    <div class="text-5xl mb-8">🔮</div>
    <h1 class="text-3xl font-bold mb-8">Typer Darta</h1>
    <button id="discordLogin" class="w-full bg-gradient-to-r from-yellow-500 to-yellow-600 hover:from-yellow-400 text-black py-4 px-6 rounded-xl font-bold text-lg mb-6 shadow-lg hover:shadow-xl transition-all">
      Zaloguj przez Discord
    </button>
    <p id="status" class="text-gray-300 text-sm">Kliknij aby rozpocząć typowanie</p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden max-w-6xl mx-auto">
  <div class="card p-8 rounded-2xl mb-8 flex flex-col md:flex-row gap-6 items-center md:items-start">
    <img id="avatar" class="w-24 h-24 rounded-full ring-4 ring-yellow-400">
    <div class="text-center md:text-left flex-1">
      <h2 id="username" class="text-3xl font-bold mb-4"></h2>
      <div class="flex flex-wrap gap-8 text-xl">
        <div>Punkty: <span id="userPoints" class="font-black text-3xl text-yellow-400">0</span></div>
      </div>
    </div>
  </div>

  <div id="questionsList" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8 mb-12"></div>

  <div class="flex justify-center gap-4">
    <button onclick="logout()" class="bg-gray-700 hover:bg-gray-600 text-white py-4 px-10 rounded-xl font-bold text-xl shadow-lg hover:shadow-xl transition-all">
      Wyloguj
    </button>
  </div>
</div>

<script>
// CONFIG
const CLIENT_ID = '1483233223013302424';
const SHEET_API = 'https://script.google.com/macros/s/AKfycbzMMcBHZaFYfslqMdBDW0u3T6uADWKDIJVrAvCfl9362ChLHhQ4pwqjRqW1G5vlU1JMBQ/exec';

let user = null, questions = [], answers = {};

// LOGIN
document.getElementById('discordLogin').onclick = e => {
  e.preventDefault();
  const redirect_uri = encodeURIComponent(window.location.origin + '/dart/discord-callback.html');
  const url = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${redirect_uri}&response_type=token&scope=identify`;
  window.open(url,'_self');
};

async function validateSession() {
  const saved = localStorage.getItem('typer_user');
  if(!saved) return false;
  const u = JSON.parse(saved);
  if(u.expires && Date.now() > u.expires){ localStorage.removeItem('typer_user'); return false; }
  user = u; return true;
}

function showDashboard(){
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');
  document.getElementById('avatar').src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=128`;
  document.getElementById('username').textContent = user.username;
  loadQuestions();
}

async function loadQuestions(){
  const res = await fetch(SHEET_API+'?type=all');
  const data = await res.json();
  questions = data.questions;
  answers = data.answers[user.id] || {};
  renderQuestions();
  calcPoints();
}

function renderQuestions(){
  const container = document.getElementById('questionsList');
  container.innerHTML = questions.map((q,i)=>{
    const now = new Date();
    const deadline = new Date(q.deadline);
    const expired = now > deadline;
    return `<div class="card p-6 rounded-2xl hover:shadow-2xl transition-all">
      <div class="text-xl font-bold mb-4 text-center pb-2 border-b border-yellow-500/50 ${expired?'deadline-expired':'deadline-active'}">
        ${expired?'✅ ROZSTRZYGNIĘTE':formatTime(deadline)}
      </div>
      <h3 class="text-xl font-bold mb-4 text-center">${q.question}</h3>
      <div class="space-y-3 mb-4">
        ${q.options.map((opt,j)=>{
          let cls='', onclick='';
          if(!expired){
            onclick = `onclick="answerQuestion(${i},${j})"`;
          }
          if(q.correct!=null){
            if(answers[i]==j && j==q.correct) cls='correct';
            else if(answers[i]==j && j!=q.correct) cls='wrong';
            else cls='waiting';
          } else cls='waiting';
          return `<div class="p-4 rounded-xl border-2 border-gray-600 cursor-pointer ${cls}" ${onclick}>${String.fromCharCode(65+j)}: ${opt}</div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function formatTime(d){
  const diff = new Date(d)-new Date();
  if(diff<=0) return "WYGASŁE";
  const h=Math.floor(diff/3600000);
  const m=Math.floor((diff%3600000)/60000);
  const s=Math.floor((diff%60000)/1000);
  return `${h}h ${m}m ${s}s`;
}

async function answerQuestion(qid,optid){
  await fetch(SHEET_API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'answer',userId:user.id,qid,answer:optid})});
  answers[qid]=optid;
  renderQuestions();
  calcPoints();
}

function calcPoints(){
  let pts=0;
  questions.forEach((q,i)=>{
    if(q.correct!=null && answers[i]==q.correct) pts+=q.points||1;
  });
  document.getElementById('userPoints').textContent=pts;
}

function logout(){ localStorage.removeItem('typer_user'); location.reload(); }
</script>
</body>
</html>
