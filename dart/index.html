<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎯 Typer Dart</title>
<style>
body { margin:0; font-family:sans-serif; background:#0f0f0f; color:#fff; }
header { background:#c40000; padding:12px; text-align:center; font-size:22px; }
.container { max-width:600px; margin:0 auto; padding:12px; }
.card { background:#1a1a1a; padding:12px; margin:12px 0; border-radius:10px; border-left:4px solid #c40000; }
button { padding:8px 12px; margin:2px; border:none; border-radius:6px; cursor:pointer; font-weight:bold; }
button.selected { background:#1e90ff; color:#fff; }
button.correct { background:#44ff44; color:#000; }
button.wrong { background:#ff4444; color:#000; }
button.pending { background:#888; color:#000; cursor:not-allowed; }
#ranking .user { display:flex; justify-content:space-between; padding:6px; background:#111; border-radius:6px; margin:4px 0; }
#countdown { text-align:center; font-weight:bold; margin-bottom:12px; font-size:18px; }
</style>
</head>
<body>
<header>🎯 Typer Dart</header>
<div class="container" id="typerApp">
  <div id="countdown"></div>
  <div id="questionsArea"></div>
  <h3>🏆 Ranking Globalny</h3>
  <div id="ranking"></div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwLOFahdAvzVw7WDL1CSO8orf1euEABlLcpHSs-yRGQvbLeCPF7FwIXh8M1p4kN5U9F/exec";
let data, user;

function renderQuestions() {
  const qArea = document.getElementById("questionsArea");
  qArea.innerHTML = "";
  data.questions.forEach(q => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `<b>${q.match}</b><br>${q.question}<br>`;
    
    const now = new Date();
    const deadline = new Date(q.deadline);
    const disabled = now>deadline;
    
    q.options.forEach(o => {
      const btn = document.createElement("button");
      btn.textContent = o;
      btn.disabled = disabled;
      btn.className = "pending";
      const userAnswer = data.answers.find(a=>a.userId==user.id && a.qid==q.id);
      if(userAnswer && userAnswer.answer==o) btn.className = disabled ? (q.correct==o ? 'correct':'wrong') : 'selected';
      btn.onclick = ()=>submitAnswer(q.id, o, btn, card, disabled);
      card.appendChild(btn);
    });
    qArea.appendChild(card);
  });
}

async function submitAnswer(qid, answer, btn, card, disabled){
  if(disabled) return;
  const buttons = card.querySelectorAll("button");
  buttons.forEach(b=>b.classList.remove("selected"));
  btn.classList.add("selected");
  try {
    await fetch(API, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({action:"answer", userId:user.id, qid, answer})
    });
    const ansIndex = data.answers.findIndex(a=>a.userId==user.id && a.qid==qid);
    if(ansIndex>-1) data.answers[ansIndex].answer=answer;
    else data.answers.push({userId:user.id,qid,answer});
    renderRanking();
  } catch(err) { console.error(err); }
}

function renderRanking(){
  const rankDiv = document.getElementById("ranking");
  const scores = data.users.map(u=>{
    const userAnswers = data.answers.filter(a=>a.userId==u.id);
    const correctCount = userAnswers.filter(a=>{
      const q = data.questions.find(qq=>qq.id==a.qid);
      return q && q.correct==a.answer;
    }).length;
    return {username:u.username, points:u.points + correctCount, avatar:u.avatar, correct:correctCount, total:userAnswers.length};
  }).sort((a,b)=>b.points-a.points);
  
  rankDiv.innerHTML = scores.map(s=>
    `<div class="user"><span>${s.username}</span><span>${s.correct}/${s.total} (${s.points}pkt)</span></div>`
  ).join("");
}

async function loadData(){
  user = JSON.parse(localStorage.getItem("dc_user"));
  if(!user){
    const nick = prompt("Podaj swój nick do Typera");
    user={id:Date.now(),username:nick,avatar:"",points:0};
    await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"addUser",...user})});
    localStorage.setItem("dc_user",JSON.stringify(user));
  }
  const res = await fetch(API);
  data = await res.json();
  renderQuestions();
  renderRanking();
  setupCountdown();
}

function setupCountdown(){
  const countdown = document.getElementById("countdown");
  function update(){
    const upcoming = data.questions.filter(q=>!q.correct).map(q=>new Date(q.deadline)).sort((a,b)=>a-b)[0];
    if(!upcoming){ countdown.textContent="Brak aktywnych pytań"; return; }
    const diff = new Date(upcoming)-new Date();
    if(diff<=0){ countdown.textContent="⏳ Czekamy na wyniki"; return; }
    const d=Math.floor(diff/1000/60/60/24), h=Math.floor(diff/1000/60/60)%24, m=Math.floor(diff/1000/60)%60, s=Math.floor(diff/1000)%60;
    countdown.textContent=`Kolejny mecz za: ${d}d ${h}h ${m}m ${s}s`;
  }
  update(); setInterval(update,1000);
}

loadData();
</script>
</body>
</html>
