<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎯 Typer Dart</title>
  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    header {
      background: #c40000;
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }
    .container {
      padding: 12px;
    }
    .card {
      background: #1a1a1a;
      margin-bottom: 15px;
      padding: 15px;
      border-radius: 10px;
      animation: fadeIn 0.3s ease;
    }
    button {
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    button:hover {
      transform: scale(1.02);
    }
    .btn-select { background: #333; color: white; }
    .btn-save { background: #c40000; color: white; font-weight: bold; }
    .correct { background: green !important; }
    .wrong { background: red !important; }
    .pending { background: gray !important; }
    .timer { font-size: 14px; margin-top: 8px; opacity: 0.8; }
    .login-btn {
      background: #5865f2;
      color: white;
      padding: 12px;
      font-size: 18px;
      margin: 20px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }
    .rank {
      background: #111;
      padding: 10px;
      margin: 12px;
      border-radius: 10px;
    }
    .player {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 6px;
    }
    .player img {
      width: 36px;
      height: 36px;
      border-radius: 50%;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<header>🎯 TYPER DART</header>

<div id="loginBox" class="container"></div>

<div id="questionsContainer" class="container"></div>

<div class="rank container">
  <h3>🏆 Ranking</h3>
  <div id="rankingList"></div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwLOFahdAvzVw7WDL1CSO8orf1euEABlLcpHSs-yRGQvbLeCPF7FwIXh8M1p4kN5U9F/exec";

let user = JSON.parse(localStorage.getItem("dc_user")) || null;
let selected = {};

function showLogin() {
  loginBox.innerHTML = `<button class="login-btn" onclick="loginDiscord()">Zaloguj przez Discord</button>`;
}

function loginDiscord() {
  const CLIENT_ID = "1483233223013302424";
  const REDIRECT = encodeURIComponent("https://dcranking.pl/dart/discord-callback.html");
  location.href = `https://discord.com/oauth2/authorize?client_id=${CLIENT_ID}&response_type=token&scope=identify&redirect_uri=${REDIRECT}`;
}

function loadApp() {
  loginBox.innerHTML = `<div>👤 ${user.username}</div>`;
  fetch(API).then(r=>r.json()).then(data=>{
    renderQuestions(data.questions);
    renderRanking(data.users);
  });
}

function renderQuestions(questions) {
  let html = "";
  questions.forEach(q => {
    let now = Date.now();
    let end = new Date(q.deadline).getTime();
    let locked = now > end;
    html += `<div class="card">
      <div><b>${q.match}</b></div>
      <div>${q.question}</div>
      <div class="timer" id="timer${q.id}"></div>
      ${q.options.map(o => `
        <button class="btn-select ${q.correct ? (o === q.correct ? "correct":"wrong") : ""}" 
          onclick="pick(${q.id}, '${o}')" ${locked ? 'disabled':''}>${o}</button>
      `).join("")}
      ${locked ? "" : `<button class="btn-save" onclick="saveAnswer(${q.id})">ZAPISZ</button>`}
    </div>`;
  });
  questionsContainer.innerHTML = html;
  setInterval(()=>updateTimers(questions), 1000);
}

function pick(qid, val) {
  selected[qid] = val;
}

function saveAnswer(qid) {
  if(!selected[qid]) return alert("Wybierz opcję!");
  fetch(API, {
    method:"POST",
    headers:{"Content-Type":"text/plain"},
    body:JSON.stringify({
      action:"answer",
      userId:user.id,
      qid,
      answer:selected[qid]
    })
  }).then(()=>alert("Zapisano!"));
}

function renderRanking(users) {
  users.sort((a,b)=>b.points - a.points);
  let html = "";
  users.forEach(u => {
    let avaUrl = u.avatar 
      ? `https://cdn.discordapp.com/avatars/${u.id}/${u.avatar}.png?size=64`
      : "";
    html += `<div class="player">
      ${avaUrl ? `<img src="${avaUrl}">` : ""}
      ${u.username} - ${u.points} pkt
    </div>`;
  });
  rankingList.innerHTML = html;
}

function updateTimers(questions) {
  questions.forEach(q => {
    const el = document.getElementById("timer"+q.id);
    if(!el) return;
    let now = Date.now();
    let end = new Date(q.deadline).getTime();
    if(now >= end) {
      el.textContent = "⛔ Zamknięte";
    } else {
      let diff = end - now;
      let d = Math.floor(diff / 86400000);
      let h = Math.floor((diff%86400000)/3600000);
      let m = Math.floor((diff%3600000)/60000);
      let s = Math.floor((diff%60000)/1000);
      el.textContent = `⏱ ${d}d ${h}h ${m}m ${s}s`;
    }
  });
}

if(!user) showLogin();
else loadApp();
</script>

</body>
</html>
