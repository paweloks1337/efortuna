<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎯 Typer Dart Fantasy</title>
  <style>
    body {background:#0f0f0f;color:#ffd700;font-family:Arial,sans-serif;margin:0;padding:20px;}
    button {background:#ffd700;color:#000;border:none;padding:12px 24px;margin:5px;cursor:pointer;border-radius:5px;font-weight:bold;}
    button:hover {background:#ffed4a;}
    .question {background:rgba(255,215,0,0.1);margin:20px 0;padding:20px;border:1px solid #ffd700;border-radius:10px;}
    .deadline {color:#ff4444;font-weight:bold;}
    .ranking {margin-top:40px;}
    .rank-item {display:flex;justify-content:space-between;padding:10px;background:rgba(0,0,0,0.5);margin:5px 0;border-radius:5px;}
    #login {text-align:center;padding:50px;}
    #app {max-width:800px;margin:0 auto;}
  </style>
</head>
<body>
  <div id="login" style="display:none;">
    <h1>🎯 Typer Dart Fantasy</h1>
    <button onclick="loginDiscord()">🚀 Zaloguj Discord</button>
  </div>
  
  <div id="app" style="display:none;">
    <h1>🎯 Typer Dart <span id="username"></span></h1>
    <div id="questions"></div>
    <div id="ranking" class="ranking"></div>
  </div>

  <script>
    const CLIENT_ID = '1483233223013302424';
    const API_URL = 'https://script.google.com/macros/s/AKfycbzSZcvIbR3L76etNRasE13JV_hSD2eVPM_Fy4UaYtcU1TFel_IpTcc7ZtiE81B2WLfByw/exec';
    let user = JSON.parse(localStorage.getItem('dc_user'));

    function loginDiscord() {
      const REDIRECT = encodeURIComponent('https://dcranking.pl/dart/discord-callback.html');
      window.location.href = `https://discord.com/oauth2/authorize?client_id=${CLIENT_ID}&response_type=token&scope=identify&redirect_uri=${REDIRECT}`;
    }

    if (window.location.hash) {
      // Callback obsługiwany w discord-callback.html
      window.location.href = 'index.html';
    }

    async function loadApp() {
      if (!user) return showLogin();
      
      document.getElementById('username').textContent = user.username;
      document.getElementById('login').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      
      try {
        const res = await fetch(API_URL);
        const data = await res.json();
        
        // Pytania
        let qhtml = '';
        data.questions.forEach(q => {
          const now = Date.now();
          const deadline = new Date(q.deadline).getTime();
          const timeLeft = Math.max(0, Math.floor((deadline - now) / 1000));
          
          if (timeLeft > 0) {
            const answered = data.answers.find(a => a.userId == user.id && a.qId == q.id);
            qhtml += `
              <div class="question">
                <h3>${q.match}</h3>
                <div class="deadline">⏱ ${Math.floor(timeLeft/3600)}h ${Math.floor((timeLeft%3600)/60)}m</div>
                <p>${q.question}</p>
                ${q.options.map((opt,i) => 
                  `<button ${answered && answered.answer == i ? 'disabled style="background:#ccc"' : `onclick="saveAnswer(${q.id},${i})"}`}>${opt}</button>`
                ).join('')}
                ${answered ? `<div style="margin-top:10px;color:${answered.correct ? '#4f4' : '#f44'}">✓ Twój typ: ${q.options[answered.answer]} ${answered.correct ? '(+1pkt)' : '(0pkt)'}</div>` : ''}
              </div>`;
          }
        });
        document.getElementById('questions').innerHTML = qhtml || '<p>Brak aktywnych meczów.</p>';
        
        // Ranking TOP 10
        data.users.sort((a,b) => b.points - a.points);
        document.getElementById('ranking').innerHTML = `
          <h2>🏆 Ranking (${data.users[0]?.points || 0} max pkt)</h2>
          ${data.users.slice(0,10).map((u,i) => 
            `<div class="rank-item">
              <span>${i+1}. ${u.username}</span>
              <span>${u.points} pkt (${u.played} typów)</span>
            </div>`
          ).join('')}`;
          
      } catch(err) {
        console.error(err);
        alert('Błąd ładowania: ' + err.message);
      }
    }
    
    async function saveAnswer(qId, answer) {
      try {
        await fetch(API_URL, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({action: 'saveAnswer', userId: user.id, qId, answer})
        });
        loadApp();
      } catch(err) {
        alert('Błąd zapisu');
      }
    }
    
    function showLogin() {
      document.getElementById('login').style.display = 'block';
    }
    
    loadApp();
  </script>
</body>
</html>
