<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Jasnowidz</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white p-6">

<!-- LOGIN -->
<div id="loginScreen" class="max-w-md mx-auto mt-20 text-center">
    <button id="discordLogin" class="bg-yellow-500 px-6 py-3 rounded-xl font-bold">
        Zaloguj przez Discord
    </button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden max-w-5xl mx-auto">

<h1 id="username" class="text-3xl font-bold mb-6"></h1>

<div id="questionsList" class="grid gap-6"></div>

<button onclick="adminLogin()" class="mt-8 bg-yellow-500 px-6 py-3 rounded-xl">
ADMIN
</button>

</div>

<!-- ADMIN -->
<div id="adminPanel" class="hidden">

<h2 class="text-2xl mb-4">Dodaj pytanie</h2>

<input id="adminQ" placeholder="Pytanie" class="text-black p-2 w-full mb-2">
<input id="optA" placeholder="A" class="text-black p-2 w-full mb-2">
<input id="optB" placeholder="B" class="text-black p-2 w-full mb-2">
<input id="optC" placeholder="C" class="text-black p-2 w-full mb-2">
<input id="optD" placeholder="D" class="text-black p-2 w-full mb-2">

<button onclick="addQuestion()" class="bg-green-500 px-4 py-2 mt-2">Dodaj</button>

</div>

<script>

// CONFIG
const CLIENT_ID = '1483233223013302424';
const REDIRECT_URI = window.location.origin + window.location.pathname;
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz5Bn7MZB4qub7S0K507zNzTRkFdIZeg2lR2Q_stpij1LLCqxLnFkMljpsFwWo4s8jYkg/exec';

let user = null;
let questions = [];

// LOGIN
document.getElementById('discordLogin').onclick = () => {
    window.location.href =
    `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
};

function handleLogin(){
    const hash = window.location.hash;
    if(!hash) return;

    const token = new URLSearchParams(hash.substring(1)).get('access_token');

    fetch('https://discord.com/api/users/@me',{
        headers:{Authorization:`Bearer ${token}`}
    })
    .then(r=>r.json())
    .then(data=>{
        user=data;
        localStorage.setItem('user',JSON.stringify(user));

        fetch(APPS_SCRIPT_URL,{
            method:'POST',
            body: JSON.stringify({
                action:"addUser",
                id:user.id,
                username:user.username,
                avatar:user.avatar
            })
        });

        showDashboard();
    });
}

// DASHBOARD
function showDashboard(){
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');

    document.getElementById('username').textContent = user.username;

    loadQuestions();
}

// LOAD QUESTIONS
async function loadQuestions(){
    const res = await fetch(`${APPS_SCRIPT_URL}?sheet=Questions`);
    const data = await res.json();

    questions = data.slice(1).map((row,i)=>({
        id:i,
        question:row[0],
        options:[row[1],row[2],row[3],row[4]].filter(x=>x),
        correct: row[5] !== "" ? Number(row[5]) : null
    }));

    renderQuestions();
}

// RENDER
function renderQuestions(){
    document.getElementById('questionsList').innerHTML =
    questions.map(q=>`
        <div class="bg-gray-800 p-4 rounded-xl">
            <h3 class="font-bold mb-2">${q.question}</h3>

            ${q.options.map((opt,i)=>`
                <div onclick="answer(${q.id},${i})"
                class="bg-gray-700 p-2 mb-2 cursor-pointer hover:bg-yellow-500">
                ${opt}
                </div>
            `).join('')}

        </div>
    `).join('');
}

// ANSWER
function answer(qid,opt){
    fetch(APPS_SCRIPT_URL,{
        method:'POST',
        body: JSON.stringify({
            action:"answer",
            userId:user.id,
            qid,
            answer:opt
        })
    });

    alert("Zapisano!");
}

// ADMIN
function adminLogin(){
    document.getElementById('adminPanel').classList.toggle('hidden');
}

// ADD QUESTION
async function addQuestion(){
    const question = document.getElementById('adminQ').value;

    const options = [
        optA.value,
        optB.value,
        optC.value,
        optD.value
    ].filter(x=>x);

    await fetch(APPS_SCRIPT_URL,{
        method:'POST',
        body: JSON.stringify({
            action:"addQuestion",
            question,
            options
        })
    });

    alert("Dodano!");
    loadQuestions();
}

// START
document.addEventListener('DOMContentLoaded',()=>{
    const saved = localStorage.getItem('user');

    if(saved){
        user = JSON.parse(saved);
        showDashboard();
    }

    handleLogin();
});

</script>

</body>
</html>
