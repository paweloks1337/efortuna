<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔮 Jasnowidz Fortuny</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { background: linear-gradient(135deg, #111827 0%, #1f2937 100%); color: white; font-family: system-ui, sans-serif; }
.card { background: rgba(31, 41, 55, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(251,191,36,0.3); }
.deadline-active { color: #F59E0B; font-weight: 700; }
.deadline-expired { color: #6B7280; }
.correct { background: rgba(34,197,94,0.3) !important; border-color: #10B981 !important; }
.wrong { background: rgba(239,68,68,0.3) !important; border-color: #EF4444 !important; }
</style>
</head>
<body class="min-h-screen p-4 md:p-8">

<!-- LOGIN -->
<div id="loginScreen" class="max-w-md mx-auto mt-16">
  <div class="card p-8 rounded-2xl shadow-2xl">
    <div class="text-5xl mb-8 text-center">🔮</div>
    <h1 class="text-3xl font-bold text-center mb-8">Jasnowidz Fortuny</h1>
    <button id="discordLogin" class="w-full bg-gradient-to-r from-yellow-500 to-yellow-600 hover:from-yellow-400 text-black py-4 px-6 rounded-xl font-bold text-lg mb-6 shadow-lg hover:shadow-xl transition-all">Zaloguj przez Discord</button>
    <p id="status" class="text-center text-gray-300 text-sm">Kliknij aby rozpocząć wróżenie</p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden max-w-6xl mx-auto">

  <div class="card p-8 rounded-2xl mb-8 flex flex-col md:flex-row gap-6 items-center md:items-start">
    <img id="avatar" class="w-24 h-24 rounded-full ring-4 ring-yellow-400">
    <div class="text-center md:text-left flex-1">
      <h2 id="username" class="text-3xl font-bold mb-4"></h2>
      <div class="flex flex-wrap gap-8 text-xl">
        <div>Punkty: <span id="userPoints" class="font-black text-3xl text-yellow-400">0</span></div>
        <div>Skuteczność: <span id="accuracy" class="font-black text-3xl text-yellow-400">0%</span></div>
      </div>
    </div>
  </div>

  <div id="questionsList" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8 mb-12"></div>

  <div class="buttons-container flex flex-col sm:flex-row gap-4 justify-center">
    <button onclick="adminLogin()" class="bg-gradient-to-r from-yellow-500 to-yellow-600 hover:from-yellow-400 text-black py-4 px-10 rounded-xl font-bold text-xl shadow-xl hover:shadow-2xl transition-all">🔐 Panel Admin</button>
    <button onclick="logout()" class="bg-gray-700 hover:bg-gray-600 text-white py-4 px-10 rounded-xl font-bold text-xl shadow-lg hover:shadow-xl transition-all">Wyloguj</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="hidden fixed inset-0 bg-gradient-to-br from-black to-gray-900 flex flex-col z-50 p-4 overflow-y-auto">
  <div class="max-w-5xl mx-auto pt-20 pb-20">
    <div class="card p-10 rounded-3xl mb-12 shadow-2xl">
      <h1 class="text-4xl font-bold text-center mb-12">⚙️ PANEL ADMINISTRATORA</h1>

      <!-- DODAJ PYTANIE -->
      <div class="mb-12 p-8 bg-gradient-to-r from-gray-800 to-gray-900 rounded-3xl">
        <h3 class="text-2xl font-bold mb-8 text-center">➕ DODAJ NOWE PYTANIE</h3>
        <input id="adminQ" placeholder="Treść pytania" class="w-full p-5 rounded-2xl border-2 border-yellow-400 bg-gray-900 text-white mb-6 text-lg focus:outline-none">
        <div class="grid grid-cols-2 gap-4 mb-6">
          <input id="optA" placeholder="Opcja A" class="p-4 rounded-xl border-2 border-gray-600 bg-gray-900 text-white focus:border-yellow-400">
          <input id="optB" placeholder="Opcja B" class="p-4 rounded-xl border-2 border-gray-600 bg-gray-900 text-white focus:border-yellow-400">
        </div>
        <div class="grid grid-cols-2 gap-4 mb-6">
          <input id="optC" placeholder="Opcja C (opcjonalne)" class="p-4 rounded-xl border-2 border-gray-600 bg-gray-900 text-white focus:border-yellow-400">
          <input id="optD" placeholder="Opcja D (opcjonalne)" class="p-4 rounded-xl border-2 border-gray-600 bg-gray-900 text-white focus:border-yellow-400">
        </div>
        <input id="deadline" type="datetime-local" class="w-full p-4 rounded-xl border-2 border-gray-600 bg-gray-900 text-white mb-6 focus:border-yellow-400">
        <button onclick="addQuestion()" class="w-full bg-gradient-to-r from-emerald-500 to-emerald-600 hover:from-emerald-400 text-white py-4 px-8 rounded-2xl font-bold text-xl shadow-xl hover:shadow-2xl transition-all">➕ DODAJ PYTANIE</button>
      </div>

      <div id="adminQuestionsList" class="space-y-6 max-h-96 overflow-y-auto"></div>

    </div>
    <div class="text-center">
      <button onclick="closeAdmin()" class="bg-gradient-to-r from-gray-700 to-gray-600 hover:from-gray-600 text-white py-4 px-12 rounded-2xl font-bold text-xl shadow-xl hover:shadow-2xl transition-all">🚪 ZAMKNIJ PANEL</button>
    </div>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwYD1eZv_MJPQBt6QxI8EfG7OTwFUKEKkGz8U-XHsxvxHO9bZiNoCzF0kdkMEajEUGJ5A/exec";
const ADMIN_PASS = "zmienToNaCosTrudnego123!";
const ADMIN_IDS = ["1192231948173709453"];
let user = null, questions = [];

// ===== LOGIN =====
document.getElementById("discordLogin").onclick = async function() {
  const client_id = "1483233223013302424";
  const redirect_uri = window.location.origin + window.location.pathname;
  window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${client_id}&redirect_uri=${redirect_uri}&response_type=token&scope=identify`;
};

// ===== FETCH USER =====
async function fetchUserFromToken(token) {
  const res = await fetch("https://discord.com/api/users/@me", { headers:{Authorization: `Bearer ${token}`}});
  const data = await res.json();
  user = data;
  localStorage.setItem("jasnowidz_user", JSON.stringify(user));

  // dodaj do arkusza
  fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({action:"addUser", id:user.id, username:user.username, avatar:user.avatar})
  });

  showDashboard();
  window.history.replaceState({}, '', window.location.pathname);
}

// ===== SHOW DASHBOARD =====
function showDashboard() {
  if(!user) return;
  document.getElementById("loginScreen").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");
  document.getElementById("avatar").src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=128`;
  document.getElementById("username").textContent = user.username || user.global_name || "Użytkownik";
  loadQuestions();
}

// ===== LOAD QUESTIONS =====
async function loadQuestions() {
  const res = await fetch(`${API_URL}?sheet=Questions`);
  const data = await res.json();
  questions = data.slice(1).map((row,i)=>({
    question: row[0],
    options: row.slice(1,5).filter(Boolean),
    correct: row[5]?parseInt(row[5]):undefined,
    deadline: row[6]||null,
    index:i
  }));
  renderQuestions();
  setInterval(renderQuestions,1000); // live update odliczania
}

// ===== RENDER QUESTIONS =====
function renderQuestions(){
  const container = document.getElementById("questionsList");
  const now = new Date();
  container.innerHTML = questions.map(q=>{
    const deadline = q.deadline ? new Date(q.deadline) : null;
    const expired = deadline && now>deadline;
    return `
      <div class="card p-8 rounded-2xl hover:shadow-2xl transition-all">
        <div class="text-xl font-bold mb-6 text-center ${expired?"deadline-expired":"deadline-active"}">
          ${deadline? (expired?"✅ ROZSTRZYGNIĘTE":timeLeft(deadline)) : ""}
        </div>
        <h3 class="text-xl font-bold mb-6 text-center">${q.question}</h3>
        <div class="space-y-3 mb-8">
          ${q.options.map((opt,j)=>`
            <div class="p-4 rounded-xl border-2 border-gray-600 hover:border-yellow-400 cursor-pointer"
                 onclick="${expired||!user?'':'answerQuestion('+q.index+','+j+')'}">
              <div class="font-bold text-lg">${String.fromCharCode(65+j)}: ${opt}</div>
            </div>
          `).join("")}
        </div>
      </div>
    `;
  }).join("") || "<div class='col-span-full text-center py-20 text-gray-400 text-xl'>Brak pytań</div>";
}

// ===== TIME LEFT =====
function timeLeft(deadline){
  const diff = deadline-new Date();
  if(diff<=0) return "WYGASŁO";
  const h = Math.floor(diff/3600000), m=Math.floor((diff%3600000)/60000), s=Math.floor((diff%60000)/1000);
  return `${h}h ${m}m ${s}s`;
}

// ===== ANSWER QUESTION =====
function answerQuestion(qid,optid){
  const q = questions[qid];
  const now = new Date();
  const deadline = q.deadline?new Date(q.deadline):null;
  if(deadline && now>deadline){alert("Pytanie już zamknięte!"); return;}
  fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({action:"answer", userId:user.id, qid:qid, answer:optid})
  });
  alert("Odpowiedź zapisana!");
}

// ===== ADMIN =====
function adminLogin(){
  if(!user||!ADMIN_IDS.includes(user.id)){alert("Nie masz uprawnień!");return;}
  const pass = prompt("Wpisz hasło admina:");
  if(pass===ADMIN_PASS){
    document.getElementById("adminPanel").classList.remove("hidden");
  } else alert("Błędne hasło!");
}

function addQuestion(){
  const q = document.getElementById("adminQ").value.trim();
  const options = ["optA","optB","optC","optD"].map(id=>document.getElementById(id).value.trim()).filter(Boolean);
  const deadline = document.getElementById("deadline").value;
  if(!q||options.length<2||!deadline){alert("Wypełnij wszystkie pola!");return;}
  fetch(API_URL,{method:"POST",body:JSON.stringify({action:"addQuestion", question:q, options:options})});
  alert("Pytanie dodane!");
}

function closeAdmin(){document.getElementById("adminPanel").classList.add("hidden");}

// ===== LOGOUT =====
function logout(){localStorage.removeItem("jasnowidz_user");location.reload();}

// ===== ON LOAD =====
window.addEventListener("DOMContentLoaded",()=>{
  const hash = window.location.hash.substring(1);
  if(hash){
    const params = new URLSearchParams(hash);
    const token = params.get("access_token");
    if(token) fetchUserFromToken(token);
  } else {
    const saved = localStorage.getItem("jasnowidz_user");
    if(saved){user=JSON.parse(saved);showDashboard();}
  }
});
</script>

</body>
</html>
