<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 JASNOWIDZ FORTUNY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #FBBF24; --dark: #1F2937; --bg-dark: #111827; }
        body { 
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1f2937 100%); 
            color: white; 
            font-family: system-ui, -apple-system, sans-serif;
        }
        .card { 
            background: rgba(31, 41, 55, 0.95); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(251, 191, 36, 0.3);
        }
        .deadline-active { color: #F59E0B; font-weight: 700; }
        .deadline-expired { color: #6B7280; }
        .correct { background: rgba(34, 197, 94, 0.3) !important; border-color: #10B981 !important; }
        .wrong { background: rgba(239, 68, 68, 0.3) !important; border-color: #EF4444 !important; }
        .admin-correct { border-color: #10B981 !important; background: rgba(34, 197, 94, 0.2) !important; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <!-- LOGIN -->
    <div id="loginScreen" class="max-w-md mx-auto mt-16">
        <div class="card p-8 rounded-2xl shadow-2xl">
            <div class="text-4xl mb-6 text-center">🔮</div>
            <h1 class="text-3xl font-bold text-center mb-8 text-white">Jasnowidz Fortuny</h1>
            <button id="discordLogin" class="w-full bg-gradient-to-r from-yellow-500 to-yellow-600 hover:from-yellow-400 text-black py-4 px-6 rounded-xl font-bold text-lg mb-6 shadow-lg hover:shadow-xl transition-all">
                Zaloguj przez Discord
            </button>
            <p id="status" class="text-center text-gray-300 text-sm">Kliknij aby rozpocząć wróżenie</p>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="hidden max-w-6xl mx-auto">
        <!-- USER INFO -->
        <div class="card p-6 rounded-2xl mb-8 flex flex-col md:flex-row gap-6 items-center md:items-start">
            <img id="avatar" class="w-20 h-20 rounded-full ring-2 ring-yellow-500">
            <div class="text-center md:text-left flex-1">
                <h2 id="username" class="text-2xl font-bold mb-2"></h2>
                <div class="flex flex-wrap gap-6 text-lg">
                    <div>Punkty: <span id="userPoints" class="font-bold text-2xl text-yellow-400">0</span></div>
                    <div>Skuteczność: <span id="accuracy" class="font-bold text-2xl text-yellow-400">0%</span></div>
                </div>
            </div>
        </div>

        <!-- QUESTIONS -->
        <div id="questionsList" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8"></div>

        <!-- BUTTONS -->
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <button onclick="adminLogin()" class="bg-yellow-500 hover:bg-yellow-400 text-black py-3 px-8 rounded-xl font-bold text-lg shadow-lg hover:shadow-xl transition-all">
                🔐 Panel Admin
            </button>
            <button onclick="logout()" class="bg-gray-700 hover:bg-gray-600 text-white py-3 px-8 rounded-xl font-bold text-lg shadow-lg hover:shadow-xl transition-all">
                Wyloguj
            </button>
        </div>
    </div>

    <!-- ADMIN LOGIN -->
    <div id="adminLoginScreen" class="hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-40 p-4">
        <div class="card p-8 rounded-2xl max-w-sm w-full mx-4">
            <div class="text-3xl mb-6 text-center">🔐</div>
            <h2 class="text-2xl font-bold text-center mb-6">Panel Admin</h2>
            <input id="adminPass" type="password" placeholder="Hasło admin..." class="w-full p-4 rounded-xl border border-gray-500 bg-gray-900 text-white text-lg mb-6 text-center focus:border-yellow-500 focus:outline-none">
            <button onclick="checkAdmin()" class="w-full bg-gradient-to-r from-yellow-500 to-yellow-600 hover:from-yellow-400 text-black py-4 px-6 rounded-xl font-bold text-lg shadow-lg hover:shadow-xl">
                Wejdź do panelu
            </button>
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <div id="adminPanel" class="hidden fixed inset-0 bg-black bg-opacity-95 z-50 p-4 overflow-y-auto">
        <div class="max-w-4xl mx-auto pt-20 pb-20">
            <div class="card p-8 rounded-3xl mb-8">
                <h1 class="text-3xl font-bold text-center mb-8">⚙️ Panel Administratora</h1>
                
                <!-- ADD QUESTION -->
                <div class="mb-12">
                    <h3 class="text-xl font-bold mb-6">➕ Dodaj nowe pytanie</h3>
                    <input id="adminQ" placeholder="Wpisz pytanie jasnowidza..." class="w-full p-4 rounded-xl border border-gray-600 bg-gray-900 text-white mb-4 text-lg">
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <input id="optA" placeholder="Opcja A" class="p-3 rounded-xl border border-gray-600 bg-gray-900 text-white">
                        <input id="optB" placeholder="Opcja B" class="p-3 rounded-xl border border-gray-600 bg-gray-900 text-white">
                    </div>
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <input id="optC" placeholder="Opcja C" class="p-3 rounded-xl border border-gray-600 bg-gray-900 text-white">
                        <input id="optD" placeholder="Opcja D (opcjonalnie)" class="p-3 rounded-xl border border-gray-600 bg-gray-900 text-white">
                    </div>
                    <input id="deadline" type="datetime-local" class="w-full p-3 rounded-xl border border-gray-600 bg-gray-900 text-white mb-4">
                    <button onclick="addQuestion()" class="w-full bg-green-600 hover:bg-green-500 text-white py-3 px-6 rounded-xl font-bold text-lg mb-2">
                        ➕ Dodaj pytanie
                    </button>
                </div>

                <!-- QUESTIONS LIST WITH CORRECT ANSWER BUTTONS -->
                <div>
                    <h3 class="text-xl font-bold mb-6">📋 Zarządzaj pytaniami</h3>
                    <div id="adminQuestionsList" class="space-y-4 max-h-96 overflow-y-auto"></div>
                </div>
            </div>
            <div class="text-center">
                <button onclick="closeAdmin()" class="bg-gray-700 hover:bg-gray-600 text-white py-3 px-8 rounded-xl font-bold text-lg">
                    Zamknij panel
                </button>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASS = 'cwel@123';
        const CLIENT_ID = '1483233223013302424';
        let user = null, questions = [], isAdmin = false;

        // STARTUP
        window.onload = () => {
            loadData();
            checkAuth();
        };

        function loadData() {
            try {
                user = JSON.parse(localStorage.getItem('jasnowidz_user'));
                questions = JSON.parse(localStorage.getItem('questions')) || [];
                if (user) showDashboard();
            } catch(e) {}
        }

        function checkAuth() {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const token = params.get('access_token');
            if (token) {
                fetch('https://discord.com/api/users/@me', {headers: {Authorization: `Bearer ${token}`}})
                .then(r => r.json()).then(data => {
                    user = data;
                    localStorage.setItem('jasnowidz_user', JSON.stringify(user));
                    showDashboard();
                    window.history.replaceState({}, '', window.location.pathname);
                });
            }
        }

        function showDashboard() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('avatar').src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=128`;
            document.getElementById('username').textContent = user.username;
            updateUserStats();
            renderQuestions();
        }

        function updateUserStats() {
            const userAnswers = JSON.parse(localStorage.getItem(`user_${user.id}_answers`) || '{}');
            const total = Object.keys(userAnswers).length;
            const correct = Object.values(userAnswers).filter(v => v === questions[Number(Object.keys(userAnswers).find(k => k === Object.keys(userAnswers)[0]) || 0)?.correct).length || 0;
            document.getElementById('userPoints').textContent = correct;
            document.getElementById('accuracy').textContent = total ? Math.round(correct/total*100) + '%' : '0%';
        }

        function renderQuestions() {
            document.getElementById('questionsList').innerHTML = questions.map((q, i) => {
                const now = new Date();
                const deadline = new Date(q.deadline);
                const expired = now > deadline;
                const userAnswer = JSON.parse(localStorage.getItem(`user_${user.id}_answers`) || '{}')[i];
                
                return `
                    <div class="card p-6 rounded-xl hover:shadow-xl transition-all">
                        <div class="text-lg font-bold mb-3 text-center ${expired ? 'deadline-expired' : 'deadline-active'}">
                            ${expired ? '✅ ROZSTRZYGNIĘTE' : formatTime(deadline)}
                        </div>
                        <h3 class="text-lg font-bold mb-4">${q.question}</h3>
                        <div class="space-y-2 mb-4">
                            ${q.options.map((opt, j) => `
                                <div class="p-3 rounded-lg border border-gray-600 hover:border-yellow-500 transition-all ${userAnswer === j ? (q.correct === j ? 'correct' : 'wrong') : ''} ${expired ? 'opacity-60 cursor-not-allowed' : ''}">
                                    <div class="font-semibold">${String.fromCharCode(65+j)}: ${opt}</div>
                                </div>
                            `).join('')}
                        </div>
                        ${userAnswer !== undefined ? `<div class="text-center py-2 px-3 rounded-lg font-bold mt-3 ${userAnswer === q.correct ? 'bg-green-600 text-white' : 'bg-red-600 text-white'}">Twoja: ${String.fromCharCode(65+userAnswer)}</div>` : ''}
                        ${expired && q.correct !== undefined ? `<div class="text-center py-2 px-3 rounded-lg font-bold mt-3 bg-green-600 text-white">✅ Poprawna: ${String.fromCharCode(65+q.correct)}</div>` : ''}
                    </div>
                `;
            }).join('');
        }

        function formatTime(date) {
            const now = new Date();
            const diff = date - now;
            if (diff < 0) return 'EXPIRED';
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            return `⏰ ${h}h ${m}m`;
        }

        // ADMIN FUNCTIONS
        function adminLogin() { document.getElementById('adminLoginScreen').classList.remove('hidden'); }

        function checkAdmin() {
            if (document.getElementById('adminPass').value === ADMIN_PASS) {
                document.getElementById('adminLoginScreen').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                renderAdminPanel();
            } else {
                alert('❌ Nieprawidłowe hasło!');
                document.getElementById('adminPass').value = '';
            }
        }

        function renderAdminPanel() {
            document.getElementById('adminQuestionsList').innerHTML = questions.map((q, i) => {
                const votes = {};
                for (let uid in localStorage) {
                    if (uid.includes('user_') && uid.includes('_answers')) {
                        try {
                            const answers = JSON.parse(localStorage.getItem(uid));
                            if (answers[i] !== undefined) votes[answers[i]] = (votes[answers[i]] || 0) + 1;
                        } catch(e) {}
                    }
                }
                return `
                    <div class="card p-6 rounded-xl mb-4">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h4 class="font-bold text-lg">${q.question}</h4>
                                <div class="text-sm text-gray-400 mt-1">${formatTime(new Date(q.deadline))} | Głosy: ${Object.values(votes).reduce((a,b)=>a+b,0)}</div>
                            </div>
                            <button onclick="deleteQuestion(${i})" class="bg-red-600 hover:bg-red-500 text-white px-4 py-2 rounded-lg font-bold text-sm">🗑️ Usuń</button>
                        </div>
                        <div class="grid grid-cols-${q.options.length} gap-2 mb-4">
                            ${q.options.map((opt, j) => `
                                <div onclick="setCorrectAnswer(${i}, ${j})" class="p-3 border-2 rounded-lg cursor-pointer hover:shadow-lg transition-all ${q.correct === j ? 'admin-correct' : 'border-gray-600 hover:border-yellow-400'} ${votes[j] ? `bg-gray-800` : ''}">
                                    <div class="font-semibold text-sm">${String.fromCharCode(65+j)}</div>
                                    <div class="text-xs">${votes[j] || 0} głosów</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('') || '<div class="text-center py-12 text-gray-400">Brak pytań</div>';
        }

        function addQuestion() {
            const newQ = {
                question: document.getElementById('adminQ').value,
                options: [document.getElementById('optA').value, document.getElementById('optB').value, document.getElementById('optC').value, document.getElementById('optD').value].filter(o => o.trim()),
                deadline: document.getElementById('deadline').value,
                correct: undefined
            };
            if (newQ.question.trim() && newQ.options.length >= 2 && newQ.deadline) {
                questions.push(newQ);
                localStorage.setItem('questions', JSON.stringify(questions));
                renderQuestions();
                renderAdminPanel();
                clearAdminForm();
            } else {
                alert('Wypełnij wszystkie pola poprawnie!');
            }
        }

        function setCorrectAnswer(qid, optid) {
            questions[qid].correct = optid;
            localStorage.setItem('questions', JSON.stringify(questions));
            renderQuestions();
            renderAdminPanel();
            updateUserStats();
        }

        function deleteQuestion(qid) {
            questions.splice(qid, 1);
            localStorage.setItem('questions', JSON.stringify(questions));
            renderQuestions();
            renderAdminPanel();
        }

        function clearAdminForm() {
            document.getElementById('adminQ').value = '';
            ['optA','optB','optC','optD'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('deadline').value = '';
        }

        function closeAdmin() {
            document.getElementById('adminPanel').classList.add('hidden');
            isAdmin = false;
        }

        // EVENT LISTENERS
        document.getElementById('discordLogin').onclick = () => {
            window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=https://dcranking.pl/jasnowidz/discord-callback.html&response_type=token&scope=identify`;
        };

        function logout() {
            localStorage.removeItem('jasnowidz_user');
            location.reload();
        }
    </script>
</body>
</html>
