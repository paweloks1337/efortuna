<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jasnowidz Fortuny</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> body { background: linear-gradient(to right, #8b5cf6, #ec4899); } </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div id="loginScreen" class="bg-white p-8 rounded-xl shadow-2xl max-w-md w-full text-center">
        <h1 class="text-3xl font-bold mb-6 text-purple-600">🔮 Jasnowidz Fortuny</h1>
        <button id="discordLogin" class="w-full bg-[#5865F2] text-white py-3 px-6 rounded-lg font-semibold hover:bg-[#4752C4] mb-4">Zaloguj Discord</button>
        <div id="status" class="text-sm text-gray-600">Kliknij żeby zagrać!</div>
    </div>

    <div id="homeScreen" class="hidden bg-white p-8 rounded-xl shadow-2xl max-w-md w-full text-center">
        <h2 class="text-2xl mb-4 text-green-600">✅ ZALOGOWANY!</h2>
        <h3 class="text-xl mb-6">Witaj <span id="username" class="font-bold"></span></h3>
        <button onclick="startQuiz()" class="bg-green-500 text-white py-3 px-8 rounded-lg font-bold w-full mb-4 hover:bg-green-600">🎱 GRAJ!</button>
        <button onclick="adminPanel()" class="bg-blue-500 text-white py-3 px-8 rounded-lg font-bold w-full hover:bg-blue-600">⚙️ Admin</button>
        <button onclick="logout()" class="bg-red-500 text-white py-2 px-4 rounded w-full mt-4 text-sm">Wyloguj</button>
    </div>

    <!-- QUIZ + ADMIN jak wcześniej - skraca się -->
    <div id="quizScreen" class="hidden fixed inset-0 bg-white p-4 overflow-auto">
        <div class="max-w-2xl mx-auto">
            <h2 class="text-2xl mb-6">Pytanie <span id="qNum">1</span>/<span id="totalQ">0</span> | Punkty: <span id="score">0</span></h2>
            <div id="question" class="text-xl p-6 bg-purple-50 rounded-xl mb-6"></div>
            <div id="options" class="space-y-3 mb-6"></div>
            <button id="nextBtn" onclick="nextQuestion()" class="w-full bg-purple-500 text-white py-3 rounded-lg font-bold hidden">Dalej</button>
            <div id="result" class="hidden">
                <h3 class="text-3xl mb-6">Wynik: <span id="finalScore">0</span> pkt!</h3>
                <table class="w-full border-collapse border">
                    <thead><tr><th>Pytanie</th><th>Poprawna?</th></tr></thead>
                    <tbody id="resultsTable"></tbody>
                </table>
                <button onclick="resetQuiz()" class="w-full bg-green-500 text-white py-3 rounded-lg mt-6">Jeszcze raz</button>
            </div>
        </div>
    </div>

    <div id="adminScreen" class="hidden fixed inset-0 bg-white p-4 overflow-auto">
        <div class="max-w-4xl mx-auto">
            <h2 class="text-2xl mb-6">Panel Admin</h2>
            <div id="questionsList" class="mb-6"></div>
            <input id="newQ" placeholder="Pytanie" class="w-full p-3 border rounded mb-2">
            <input id="optA" placeholder="A" class="w-full p-2 border rounded mb-1 block w-1/3 inline-block">
            <input id="optB" placeholder="B" class="w-full p-2 border rounded mb-1 block w-1/3 inline-block">
            <input id="optC" placeholder="C" class="w-full p-2 border rounded mb-2 block w-1/3 inline-block">
            <select id="correctOpt" class="w-full p-2 border rounded mb-2"><option>A</option><option>B</option><option>C</option></select>
            <button onclick="addQuestion()" class="bg-green-500 text-white py-2 px-6 rounded w-full">Dodaj</button>
            <button onclick="backHome()" class="bg-gray-500 text-white py-2 px-6 rounded w-full mt-2">Wróć</button>
        </div>
    </div>

    <script>
        const CLIENT_ID = '1483233223013302424';
        let user = null;
        let questions = JSON.parse(localStorage.getItem('questions')) || [{q: 'Test?', options: ['A', 'B', 'C'], correct: 'A'}];
        let currentQ = 0, score = 0, answers = [];

        // SUPER PROSTE LOGOWANIE
        function tryAutoLogin() {
            // Sprawdź localStorage
            const savedUser = localStorage.getItem('jasnowidz_user');
            if (savedUser) {
                user = JSON.parse(savedUser);
                document.getElementById('username').textContent = user.username;
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('homeScreen').classList.remove('hidden');
                return true;
            }
            return false;
        }

        // Login Discord
        document.getElementById('discordLogin').onclick = () => {
            window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=https://dcranking.pl/jasnowidz/discord-callback.html&response_type=token&scope=identify`;
        };

        // Po powrocie z Discord
        window.onload = () => {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const token = params.get('access_token');
            
            if (token) {
                fetch('https://discord.com/api/users/@me', {
                    headers: {Authorization: `Bearer ${token}`}
                }).then(r => r.json()).then(data => {
                    user = data;
                    localStorage.setItem('jasnowidz_user', JSON.stringify(user));
                    document.getElementById('username').textContent = user.username;
                    document.getElementById('loginScreen').classList.add('hidden');
                    document.getElementById('homeScreen').classList.remove('hidden');
                    window.history.replaceState({}, '', window.location.pathname);
                });
            } else {
                tryAutoLogin();
            }
        };

        function logout() {
            localStorage.removeItem('jasnowidz_user');
            location.reload();
        }

        // QUIZ
        function startQuiz() {
            document.getElementById('homeScreen').classList.add('hidden');
            document.getElementById('quizScreen').classList.remove('hidden');
            currentQ = 0; score = 0; answers = [];
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentQ];
            document.getElementById('qNum').textContent = currentQ + 1;
            document.getElementById('totalQ').textContent = questions.length;
            document.getElementById('question').textContent = q.q;
            const opts = document.getElementById('options');
            opts.innerHTML = '';
            ['A','B','C'].forEach((let,i) => {
                const btn = document.createElement('button');
                btn.textContent = `${let}: ${q.options[i]}`;
                btn.className = 'w-full p-4 border rounded-lg hover:bg-purple-100';
                btn.onclick = () => selectOption(let);
                opts.appendChild(btn);
            });
        }

        function selectOption(selected) {
            answers[currentQ] = selected === questions[currentQ].correct;
            document.querySelectorAll('#options button').forEach(b => b.disabled = true);
            document.getElementById('nextBtn').classList.remove('hidden');
        }

        function nextQuestion() {
            if (answers[currentQ]) score++;
            document.getElementById('score').textContent = score;
            currentQ++;
            if (currentQ < questions.length) showQuestion();
            else showResult();
        }

        function showResult() {
            document.getElementById('finalScore').textContent = score;
            const table = document.getElementById('resultsTable');
            table.innerHTML = '';
            questions.forEach((q,i) => {
                const row = table.insertRow();
                row.innerHTML = `<td>${q.q}</td><td>${answers[i] ? '✅' : '❌'}</td>`;
            });
            document.getElementById('result').classList.remove('hidden');
        }

        function resetQuiz() {
            document.getElementById('quizScreen').classList.add('hidden');
            document.getElementById('homeScreen').classList.remove('hidden');
        }

        // ADMIN
        function adminPanel() {
            document.getElementById('homeScreen').classList.add('hidden');
            document.getElementById('adminScreen').classList.remove('hidden');
            showQuestionsList();
        }

        function showQuestionsList() {
            document.getElementById('questionsList').innerHTML = questions.map((q,i) => 
                `<div class="p-4 bg-gray-100 rounded mb-2">${q.q} | ${q.options.join(', ')} | <span class="text-green-600">${q.correct}</span> 
                <button onclick="deleteQuestion(${i})" class="bg-red-500 text-white py-1 px-3 rounded ml-2 text-sm">Usuń</button></div>`
            ).join('');
        }

        function addQuestion() {
            const q = document.getElementById('newQ').value;
            const opts = [document.getElementById('optA').value, document.getElementById('optB').value, document.getElementById('optC').value];
            const correct = document.getElementById('correctOpt').value;
            if (q && opts.every(o => o)) {
                questions.push({q, options: opts, correct});
                localStorage.setItem('questions', JSON.stringify(questions));
                showQuestionsList();
                document.getElementById('newQ').value = '';
                ['optA','optB','optC'].forEach(id => document.getElementById(id).value = '');
            }
        }

        function deleteQuestion(i) {
            questions.splice(i, 1);
            localStorage.setItem('questions', JSON.stringify(questions));
            showQuestionsList();
        }

        function backHome() {
            document.getElementById('adminScreen').classList.add('hidden');
            document.getElementById('homeScreen').classList.remove('hidden');
        }

        document.getElementById('totalQ').textContent = questions.length;
    </script>
</body>
</html>
