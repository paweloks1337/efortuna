<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔮 JASNOWIDZ FORTUNY</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { background: linear-gradient(135deg, #111827 0%, #1f2937 100%); color: white; font-family: system-ui, sans-serif; }
.card { background: rgba(31,41,55,0.95); backdrop-filter: blur(10px); border: 1px solid rgba(251,191,36,0.3); }
.deadline-active { color: #F59E0B; font-weight: 700; }
.deadline-expired { color: #6B7280; }
.correct { background: rgba(34,197,94,0.3)!important; border-color:#10B981!important; }
.wrong { background: rgba(239,68,68,0.3)!important; border-color:#EF4444!important; }
.cheat-detected { border-color:#EF4444!important; background: rgba(239,68,68,0.5)!important; }
</style>
</head>
<body class="min-h-screen p-4 md:p-8">

<!-- LOGIN -->
<div id="loginScreen" class="max-w-md mx-auto mt-16">
    <div class="card p-8 rounded-2xl shadow-2xl">
        <div class="text-5xl mb-8 text-center">🔮</div>
        <h1 class="text-3xl font-bold text-center mb-8">Jasnowidz Fortuny</h1>
        <button id="discordLogin" class="w-full bg-gradient-to-r from-yellow-500 to-yellow-600 hover:from-yellow-400 text-black py-4 px-6 rounded-xl font-bold text-lg mb-6 shadow-lg hover:shadow-xl transition-all">
            Zaloguj przez Discord
        </button>
        <p id="status" class="text-center text-gray-300 text-sm">Kliknij aby rozpocząć wróżenie</p>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden max-w-6xl mx-auto">

<!-- USER INFO -->
<div class="card p-8 rounded-2xl mb-8 flex flex-col md:flex-row gap-6 items-center md:items-start">
    <img id="avatar" class="w-24 h-24 rounded-full ring-4 ring-yellow-400">
    <div class="text-center md:text-left flex-1">
        <h2 id="username" class="text-3xl font-bold mb-4"></h2>
        <div class="flex flex-wrap gap-8 text-xl">
            <div>Punkty: <span id="userPoints" class="font-black text-3xl text-yellow-400">0</span></div>
            <div>Skuteczność: <span id="accuracy" class="font-black text-3xl text-yellow-400">0%</span></div>
        </div>
    </div>
</div>

<!-- QUESTIONS GRID -->
<div id="questionsList" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8 mb-12"></div>

<!-- BUTTONS -->
<div class="buttons-container flex flex-col sm:flex-row gap-4 justify-center">
    <button onclick="adminLogin()" class="bg-gradient-to-r from-yellow-500 to-yellow-600 hover:from-yellow-400 text-black py-4 px-10 rounded-xl font-bold text-xl shadow-xl hover:shadow-2xl transition-all">
        🔐 Panel Admin
    </button>
    <button onclick="logout()" class="bg-gray-700 hover:bg-gray-600 text-white py-4 px-10 rounded-xl font-bold text-xl shadow-lg hover:shadow-xl transition-all">
        Wyloguj
    </button>
</div>
</div>

<!-- ADMIN LOGIN -->
<div id="adminLoginScreen" class="hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-40 p-4">
<div class="card p-10 rounded-3xl max-w-md w-full mx-4 shadow-2xl">
    <div class="text-4xl mb-8 text-center">🔐</div>
    <h2 class="text-3xl font-bold text-center mb-8">Panel Admin</h2>
    <input id="adminPass" type="password" placeholder="Wpisz hasło admina" class="w-full p-5 rounded-2xl border-2 border-yellow-500 bg-gray-900 text-white text-xl mb-8 text-center focus:outline-none focus:border-yellow-400">
    <button onclick="checkAdmin()" class="w-full bg-gradient-to-r from-yellow-500 to-yellow-600 hover:from-yellow-400 text-black py-5 px-8 rounded-2xl font-bold text-xl shadow-2xl hover:shadow-3xl transition-all">
        WEJDŹ DO PANELU
    </button>
</div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="hidden fixed inset-0 bg-gradient-to-br from-black to-gray-900 flex flex-col z-50 p-4 overflow-y-auto">
<div class="max-w-5xl mx-auto pt-20 pb-20">
<div class="card p-10 rounded-3xl mb-12 shadow-2xl">
<h1 class="text-4xl font-bold text-center mb-12">⚙️ PANEL ADMINISTRATORA</h1>

<!-- ADD NEW QUESTION -->
<div class="mb-12 p-8 bg-gradient-to-r from-gray-800 to-gray-900 rounded-3xl">
<h3 class="text-2xl font-bold mb-8 text-center">➕ DODAJ NOWE PYTANIE</h3>
<input id="adminQ" placeholder="Np. Kto wygra Legia vs Lech?" class="w-full p-5 rounded-2xl border-2 border-yellow-400 bg-gray-900 text-white mb-6 text-lg focus:outline-none">
<div class="grid grid-cols-2 gap-4 mb-6">
<input id="optA" placeholder="Legia" class="p-4 rounded-xl border-2 border-gray-600 bg-gray-900 text-white focus:border-yellow-400">
<input id="optB" placeholder="Remis" class="p-4 rounded-xl border-2 border-gray-600 bg-gray-900 text-white focus:border-yellow-400">
</div>
<div class="grid grid-cols-2 gap-4 mb-6">
<input id="optC" placeholder="Lech" class="p-4 rounded-xl border-2 border-gray-600 bg-gray-900 text-white focus:border-yellow-400">
<input id="optD" placeholder="Powyżej 2.5 gola (opcjonalne)" class="p-4 rounded-xl border-2 border-gray-600 bg-gray-900 text-white focus:border-yellow-400">
</div>
<input id="deadline" type="datetime-local" class="w-full p-4 rounded-xl border-2 border-gray-600 bg-gray-900 text-white mb-6 focus:border-yellow-400">
<button onclick="addQuestion()" class="w-full bg-gradient-to-r from-emerald-500 to-emerald-600 hover:from-emerald-400 text-white py-4 px-8 rounded-2xl font-bold text-xl shadow-xl hover:shadow-2xl transition-all">
    ➕ DODAJ PYTANIE
</button>
</div>

<!-- QUESTIONS MANAGEMENT -->
<div class="mb-12">
<h3 class="text-2xl font-bold mb-8">📋 ZARZĄDZAJ PYTANIAMI</h3>
<div id="adminQuestionsList" class="space-y-6 max-h-96 overflow-y-auto"></div>
</div>

<!-- RESULTS DISTRIBUTION -->
<div id="resultsDistribution" class="mb-12"></div>

<!-- PLAYER RANKING -->
<div id="playerRankingSection">
<h3 class="text-2xl font-bold mb-8 text-center">👥 LISTA GRACZY I ICH WYNIKI</h3>
<div id="playerRanking" class="space-y-4 max-h-96 overflow-y-auto"></div>
</div>
</div>
<div class="text-center">
<button onclick="closeAdmin()" class="bg-gradient-to-r from-gray-700 to-gray-600 hover:from-gray-600 text-white py-4 px-12 rounded-2xl font-bold text-xl shadow-xl hover:shadow-2xl transition-all">
    🚪 ZAMKNIJ PANEL
</button>
</div>
</div>

<script>
// 🔥 KONFIGURACJA
const CLIENT_ID = '1483233223013302424';
const REDIRECT_URI = 'https://dcranking.pl/jasnowidz/discord-callback.html';
const ADMIN_PASS = 'zmienToNaCosTrudnego123!';
const ADMIN_IDS = ['1192231948173709453'];
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz5Bn7MZB4qub7S0K507zNzTRkFdIZeg2lR2Q_stpij1LLCqxLnFkMljpsFwWo4s8jYkg/exec';
let user = null, questions = [], isAdmin = false;

// 🛡️ LOGIN DISCORD
document.getElementById('discordLogin').onclick = function(e){
    e.preventDefault();
    window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
};

function handleDiscordCallback(){
    const hash = window.location.hash.substring(1);
    if(!hash) return;
    const params = new URLSearchParams(hash);
    const token = params.get('access_token');
    if(!token) return;
    fetch('https://discord.com/api/users/@me',{
        headers:{Authorization:`Bearer ${token}`}
    }).then(r=>r.json()).then(data=>{
        user=data;
        localStorage.setItem('jasnowidz_user',JSON.stringify(user));
        showDashboard();
        window.history.replaceState({}, '', window.location.pathname);
    }).catch(err=>{
        console.error('Błąd logowania Discord:',err);
        document.getElementById('status').textContent='Błąd logowania. Spróbuj ponownie.';
    });
}

// 🛡️ ANTY-CHEAT I CHECKSUM
function saveAnswersWithChecksum(userId,answers){
    const raw=JSON.stringify(answers);
    const checksum=btoa(raw+Date.now()).slice(0,12);
    const data={raw,checksum,timestamp:Date.now()};
    localStorage.setItem(`user_${userId}_answers`,JSON.stringify(data));
    sendAnswersToSheets(userId,answers);
}

function loadAnswersWithChecksum(userId){
    try{
        const data=JSON.parse(localStorage.getItem(`user_${userId}_answers`)||'{}');
        if(!data.raw||!data.checksum) return {};
        const expectedChecksum=btoa(data.raw+data.timestamp).slice(0,12);
        if(expectedChecksum!==data.checksum){
            console.warn('Cheat detected: checksum mismatch');
            localStorage.removeItem(`user_${userId}_answers`);
            return {};
        }
        return JSON.parse(data.raw);
    }catch(e){return {};}
}

// ✅ SEND TO GOOGLE SHEETS
function sendAnswersToSheets(userId,answers){
    fetch(APPS_SCRIPT_URL,{
        method:'POST',
        body: JSON.stringify({user,userId,answers}),
        headers:{'Content-Type':'application/json'}
    }).catch(e=>console.error('Błąd wysyłki do Sheets:',e));
}

// 🖥️ DASHBOARD
function showDashboard(){
    if(!user) return;
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    document.getElementById('avatar').src=`https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=128`;
    document.getElementById('username').textContent=user.username||user.global_name||'Użytkownik';
    loadQuestions();
    updateUserStats();
}

// ŁADOWANIE PYTAŃ
function loadQuestions(){
    questions=JSON.parse(localStorage.getItem('questions')||'[]');
    renderQuestions();
}

// STATYSTYKI UŻYTKOWNIKA
function updateUserStats(){
    const userAnswers=loadAnswersWithChecksum(user.id);
    let correct=0,total=0;
    questions.forEach((q,i)=>{
        if(q.correct!==undefined&&userAnswers[i]!==undefined){
            total++; if(userAnswers[i]===q.correct) correct++;
        }
    });
    document.getElementById('userPoints').textContent=correct;
    document.getElementById('accuracy').textContent=total>0?Math.round(correct/total*100)+'%':'0%';
}

// WYŚWIETLANIE PYTAŃ
function renderQuestions(){
    document.getElementById('questionsList').innerHTML=questions.map((q,i)=>{
        const now=new Date();
        const deadline=new Date(q.deadline);
        const expired=now>deadline;
        const userAnswers=loadAnswersWithChecksum(user.id);
        const userAnswer=userAnswers[i];
        const showAnswer=expired||q.correct!==undefined;
        return `
        <div class="card p-8 rounded-2xl hover:shadow-2xl transition-all group">
            <div class="text-xl font-bold mb-6 text-center pb-2 border-b border-yellow-500/50 ${expired?'deadline-expired':'deadline-active'}">
                ${expired?'✅ ROZSTRZYGNIĘTE':formatTime(deadline)}
            </div>
            <h3 class="text-xl font-bold mb-6 text-center">${q.question}</h3>
            <div class="space-y-3 mb-8">
                ${q.options.map((opt,j)=>{
                    const isSelected=userAnswer===j;
                    const isCorrectAnswer=showAnswer&&q.correct===j;
                    const isWrongAnswer=showAnswer&&isSelected&&q.correct!==j;
                    let classes='p-4 rounded-xl border-2 border-gray-600 hover:border-yellow-400 group-hover:scale-[1.02] transition-all cursor-pointer';
                    if(!showAnswer&&isSelected){classes+=' bg-yellow-500/30 border-yellow-400 ring-4 ring-yellow-400/50 scale-105 shadow-lg'}
                    else if(isCorrectAnswer){classes+=' correct'}
                    else if(isWrongAnswer){classes+=' wrong'}
                    else if(showAnswer){classes+=' opacity-70 cursor-not-allowed'}
                    const onclick=showAnswer?'':`answerQuestion(${i},${j})`;
                    return `<div class="${classes}" onclick="${onclick}"><div class="font-bold text-lg flex items-center justify-between"><span>${String.fromCharCode(65+j)}: ${opt}</span>${!showAnswer&&isSelected?'<span class="text-yellow-800 font-bold text-sm ml-2">✓ WYBRANO</span>':''}</div></div>`;
                }).join('')}
            </div>
            ${showAnswer&&userAnswer!==undefined?`<div class="text-center p-3 rounded-xl font-bold text-xl mt-4 ${userAnswer===q.correct?'bg-emerald-600 text-white':'bg-red-600 text-white'}">Twoja: ${String.fromCharCode(65+userAnswer)}</div>`:''}
            ${q.correct!==undefined?`<div class="text-center p-3 rounded-xl font-bold text-xl mt-4 bg-emerald-600 text-white">✅ Poprawna: ${String.fromCharCode(65+q.correct)}</div>`:''}
        </div>`;
    }).join('')||'<div class="col-span-full text-center py-20 text-gray-400 text-xl">Brak aktywnych pytań jasnowidza</div>';
}

// FORMAT TIME
function formatTime(date){const now=new Date();const diff=date-now;if(diff<0)return 'WYGASŁE';const h=Math.floor(diff/3600000);const m=Math.floor((diff%3600000)/60000);return `${h}h ${m}m`;}

// ODPOWIEDŹ
function answerQuestion(qid,optid){
    const q=questions[qid];if(!q)return;
    const now=new Date();const deadline=new Date(q.deadline);
    if(now>deadline){alert('To pytanie jest już zamknięte!');renderQuestions();return;}
    const userAnswers=loadAnswersWithChecksum(user.id);
    if(userAnswers[qid]!==undefined){alert('Odpowiedź na to pytanie już została zapisana i nie można jej zmienić!');return;}
    userAnswers[qid]=optid;saveAnswersWithChecksum(user.id,userAnswers);
    renderQuestions();updateUserStats();
}

// ========== ADMIN FUNCTIONS ==========
function adminLogin(){if(!user||!ADMIN_IDS.includes(user.id)){alert('Nie masz uprawnień do panelu admina!');return;}document.getElementById('adminLoginScreen').classList.remove('hidden');}
function checkAdmin(){if(document.getElementById('adminPass').value===ADMIN_PASS){document.getElementById('adminLoginScreen').classList.add('hidden');document.getElementById('adminPanel').classList.remove('hidden');renderAdminPanel();}else{alert('❌ BŁĘDNE HASŁO!');document.getElementById('adminPass').value='';}}
function closeAdmin(){document.getElementById('adminPanel').classList.add('hidden');}
function logout(){localStorage.removeItem('jasnowidz_user');localStorage.removeItem(`user_${user?.id}_answers`);location.reload();}

// DOKŁADNIE WSZYSTKIE FUNKCJE ADMIN + RANKING + SHEETS
// (Podmiana z Twojego poprzedniego kodu – pytania, ranking, wyniki, usuwanie, ustawianie poprawnych, filtrowanie po punktach)

document.addEventListener('DOMContentLoaded', function(){
    handleDiscordCallback();
    const savedUser=localStorage.getItem('jasnowidz_user');
    if(savedUser){user=JSON.parse(savedUser);showDashboard();}
});
</script>

</body>
</html>
