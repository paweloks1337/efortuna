<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dart Typer</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white p-4">

<div id="loginScreen" class="text-center mt-20">
  <button id="loginBtn" class="bg-yellow-500 px-6 py-4 rounded-xl text-black font-bold">
    Login Discord
  </button>
</div>

<div id="app" class="hidden max-w-6xl mx-auto">

  <div class="flex justify-between items-center mb-6">
    <div class="flex items-center gap-4">
      <img id="avatar" class="w-12 h-12 rounded-full">
      <span id="username"></span>
    </div>
    <button onclick="logout()">Wyloguj</button>
  </div>

  <!-- RANKING -->
  <div class="mb-10">
    <h2 class="text-2xl mb-4">🏆 Ranking</h2>
    <div id="ranking"></div>
  </div>

  <!-- MECZE -->
  <div id="matches"></div>

</div>

<script>
const CLIENT_ID = '1483233223013302424';
const SHEET_API = 'https://script.google.com/macros/s/AKfycbwYD1eZv_MJPQBt6QxI8EfG7OTwFUKEKkGz8U-XHsxvxHO9bZiNoCzF0kdkMEajEUGJ5A/exec';

let user = null;
let questions = [];
let answers = {};

// LOGIN
document.getElementById("loginBtn").onclick = () => {
  const redirect = encodeURIComponent(window.location.origin + "/jasnowidz/discord-callback.html");
  window.location.href =
    `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${redirect}&response_type=token&scope=identify`;
};

// CALLBACK
const hash = new URLSearchParams(window.location.hash.slice(1));
const token = hash.get("access_token");

if (token) login(token);
else loadSession();

async function login(token){
  const res = await fetch("https://discord.com/api/users/@me", {
    headers: { Authorization: `Bearer ${token}` }
  });

  const data = await res.json();

  user = {
    id: data.id,
    username: data.username,
    avatar: data.avatar
  };

  localStorage.setItem("user", JSON.stringify(user));
  start();
}

function loadSession(){
  const saved = localStorage.getItem("user");
  if(!saved) return;
  user = JSON.parse(saved);
  start();
}

function start(){
  document.getElementById("loginScreen").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  document.getElementById("username").textContent = user.username;
  document.getElementById("avatar").src =
    `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;

  loadData();
}

async function loadData(){
  const res = await fetch(`${SHEET_API}?type=all`);
  const data = await res.json();

  questions = data.questions;
  answers = data.answers || {};
  render();
  renderRanking(data.users || []);
}

// ===== RENDER =====

function render(){
  const container = document.getElementById("matches");

  const grouped = {};

  questions.forEach((q,i)=>{
    if(!grouped[q.match]) grouped[q.match] = [];
    grouped[q.match].push({...q, index:i});
  });

  container.innerHTML = Object.entries(grouped).map(([match,qs])=>`
    <div class="mb-10 p-6 bg-gray-800 rounded-xl">
      <h2 class="text-xl mb-4">${match}</h2>

      ${qs.map(q=>renderQuestion(q)).join("")}

      <button onclick="saveAnswers('${match}')" class="mt-4 bg-yellow-500 px-4 py-2 rounded text-black">
        Zapisz
      </button>
    </div>
  `).join("");
}

function renderQuestion(q){
  const userAns = answers[user.id]?.[q.index];

  const now = new Date();
  const deadline = new Date(q.deadline);
  const expired = now > deadline;

  return `
    <div class="mb-4">
      <div>${q.question}</div>
      <div class="flex gap-2 mt-2">
        ${q.options.map((opt,i)=>`
          <div onclick="${!expired ? `select(${q.index},${i})` : ''}"
            class="px-3 py-2 border rounded cursor-pointer
            ${userAns==i?'bg-yellow-500 text-black':''}">
            ${opt}
          </div>
        `).join("")}
      </div>
      <div class="text-sm text-gray-400">${countdown(deadline)}</div>
    </div>
  `;
}

// ===== AKCJE =====

function select(qid,opt){
  if(!answers[user.id]) answers[user.id]={};
  answers[user.id][qid]=opt;
  render();
}

async function saveAnswers(match){
  await fetch(SHEET_API,{
    method:'POST',
    body: JSON.stringify({
      action:"saveAnswers",
      user:user,
      answers:answers[user.id]
    })
  });
  alert("Zapisano!");
}

// ===== RANKING =====

function renderRanking(users){
  const sorted = users.sort((a,b)=>b.points-a.points);

  document.getElementById("ranking").innerHTML =
    sorted.map((u,i)=>`
      <div class="flex justify-between p-2 border-b">
        <div>${i+1}. ${u.username}</div>
        <div>${u.points}</div>
      </div>
    `).join("");
}

// ===== TIMER =====

function countdown(date){
  const diff = new Date(date) - new Date();
  if(diff<=0) return "Zamknięte";

  const d = Math.floor(diff/86400000);
  const h = Math.floor(diff/3600000)%24;
  const m = Math.floor(diff/60000)%60;
  const s = Math.floor(diff/1000)%60;

  return `${d}d ${h}h ${m}m ${s}s`;
}

setInterval(render,1000);

function logout(){
  localStorage.removeItem("user");
  location.reload();
}
</script>
</body>
</html>
