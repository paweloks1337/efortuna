<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 JASNOWIDZ FORTUNY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: linear-gradient(135deg, #111827 0%, #1f2937 100%); 
            color: white; 
            font-family: system-ui, sans-serif;
        }
        .card { 
            background: rgba(31, 41, 55, 0.95); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(251, 191, 36, 0.3);
        }
        .deadline-active { color: #F59E0B; font-weight: 700; }
        .deadline-expired { color: #6B7280; }
        .correct { background: rgba(34, 197, 94, 0.3) !important; border-color: #10B981 !important; }
        .wrong { background: rgba(239, 68, 68, 0.3) !important; border-color: #EF4444 !important; }
        .cheat-detected { border-color: #EF4444 !important; background: rgba(239, 68, 68, 0.5) !important; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <!-- LOGIN -->
    <div id="loginScreen" class="max-w-md mx-auto mt-16">
        <div class="card p-8 rounded-2xl shadow-2xl">
            <div class="text-5xl mb-8 text-center">🔮</div>
            <h1 class="text-3xl font-bold text-center mb-8">Jasnowidz Fortuny</h1>
            <button id="discordLogin" class="w-full bg-gradient-to-r from-yellow-500 to-yellow-600 hover:from-yellow-400 text-black py-4 px-6 rounded-xl font-bold text-lg mb-6 shadow-lg hover:shadow-xl transition-all">
                Zaloguj przez Discord
            </button>
            <p id="status" class="text-center text-gray-300 text-sm">Kliknij aby rozpocząć wróżenie</p>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="hidden max-w-6xl mx-auto">
        <!-- USER INFO -->
        <div class="card p-8 rounded-2xl mb-8 flex flex-col md:flex-row gap-6 items-center md:items-start">
            <img id="avatar" class="w-24 h-24 rounded-full ring-4 ring-yellow-400">
            <div class="text-center md:text-left flex-1">
                <h2 id="username" class="text-3xl font-bold mb-4"></h2>
                <div class="flex flex-wrap gap-8 text-xl">
                    <div>Punkty: <span id="userPoints" class="font-black text-3xl text-yellow-400">0</span></div>
                    <div>Skuteczność: <span id="accuracy" class="font-black text-3xl text-yellow-400">0%</span></div>
                </div>
            </div>
        </div>

        <!-- QUESTIONS GRID -->
        <div id="questionsList" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8 mb-12"></div>

        <!-- RESULTS FOR PLAYERS -->
        <div id="playerResultsSection" class="hidden mb-12"></div>

        <!-- BUTTONS -->
        <div class="buttons-container flex flex-col sm:flex-row gap-4 justify-center">
            <button onclick="adminLogin()" class="bg-gradient-to-r from-yellow-500 to-yellow-600 hover:from-yellow-400 text-black py-4 px-10 rounded-xl font-bold text-xl shadow-xl hover:shadow-2xl transition-all">
                🔐 Panel Admin
            </button>
            <button onclick="logout()" class="bg-gray-700 hover:bg-gray-600 text-white py-4 px-10 rounded-xl font-bold text-xl shadow-lg hover:shadow-xl transition-all">
                Wyloguj
            </button>
        </div>
    </div>

    <!-- ADMIN LOGIN -->
    <div id="adminLoginScreen" class="hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-40 p-4">
        <div class="card p-10 rounded-3xl max-w-md w-full mx-4 shadow-2xl">
            <div class="text-4xl mb-8 text-center">🔐</div>
            <h2 class="text-3xl font-bold text-center mb-8">Panel Admin</h2>
            <input id="adminPass" type="password" placeholder="Wpisz hasło admina" class="w-full p-5 rounded-2xl border-2 border-yellow-500 bg-gray-900 text-white text-xl mb-8 text-center focus:outline-none focus:border-yellow-400">
            <button onclick="checkAdmin()" class="w-full bg-gradient-to-r from-yellow-500 to-yellow-600 hover:from-yellow-400 text-black py-5 px-8 rounded-2xl font-bold text-xl shadow-2xl hover:shadow-3xl transition-all">
                WEJDŹ DO PANELU
            </button>
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <div id="adminPanel" class="hidden fixed inset-0 bg-gradient-to-br from-black to-gray-900 flex flex-col z-50 p-4 overflow-y-auto">
        <div class="max-w-5xl mx-auto pt-20 pb-20">
            <div class="card p-10 rounded-3xl mb-12 shadow-2xl">
                <h1 class="text-4xl font-bold text-center mb-12">⚙️ PANEL ADMINISTRATORA</h1>
                
                <!-- ADD NEW QUESTION -->
                <div class="mb-12 p-8 bg-gradient-to-r from-gray-800 to-gray-900 rounded-3xl">
                    <h3 class="text-2xl font-bold mb-8 text-center">➕ DODAJ NOWE PYTANIE</h3>
                    <input id="adminQ" placeholder="Np. Kto wygra Legia vs Lech?" class="w-full p-5 rounded-2xl border-2 border-yellow-400 bg-gray-900 text-white mb-6 text-lg focus:outline-none">
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <input id="optA" placeholder="Legia" class="p-4 rounded-xl border-2 border-gray-600 bg-gray-900 text-white focus:border-yellow-400">
                        <input id="optB" placeholder="Remis" class="p-4 rounded-xl border-2 border-gray-600 bg-gray-900 text-white focus:border-yellow-400">
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <input id="optC" placeholder="Lech" class="p-4 rounded-xl border-2 border-gray-600 bg-gray-900 text-white focus:border-yellow-400">
                        <input id="optD" placeholder="Powyżej 2.5 gola (opcjonalne)" class="p-4 rounded-xl border-2 border-gray-600 bg-gray-900 text-white focus:border-yellow-400">
                    </div>
                    <input id="deadline" type="datetime-local" class="w-full p-4 rounded-xl border-2 border-gray-600 bg-gray-900 text-white mb-6 focus:border-yellow-400">
                    <button onclick="addQuestion()" class="w-full bg-gradient-to-r from-emerald-500 to-emerald-600 hover:from-emerald-400 text-white py-4 px-8 rounded-2xl font-bold text-xl shadow-xl hover:shadow-2xl transition-all">
                        ➕ DODAJ PYTANIE
                    </button>
                </div>

                <!-- QUESTIONS MANAGEMENT -->
                <div class="mb-12">
                    <h3 class="text-2xl font-bold mb-8">📋 ZARZĄDZAJ PYTANIAMI</h3>
                    <div id="adminQuestionsList" class="space-y-6 max-h-96 overflow-y-auto"></div>
                </div>

                <!-- RESULTS DISTRIBUTION -->
                <div id="resultsDistribution" class="mb-12"></div>

                <!-- 🆕 PLAYER RANKING -->
                <div id="playerRankingSection">
                    <h3 class="text-2xl font-bold mb-8 text-center">👥 LISTA GRACZY I ICH WYNIKI</h3>
                    <div id="playerRanking" class="space-y-4 max-h-96 overflow-y-auto"></div>
                </div>
            </div>
            <div class="text-center">
                <button onclick="closeAdmin()" class="bg-gradient-to-r from-gray-700 to-gray-600 hover:from-gray-600 text-white py-4 px-12 rounded-2xl font-bold text-xl shadow-xl hover:shadow-2xl transition-all">
                    🚪 ZAMKNIJ PANEL
                </button>
            </div>
        </div>
    </div>

    <script>
        // 🔥 PEŁNY POPRAWIONY KOD Z ANTY-CHEATEM
        const ADMIN_PASS = 'cwel@123'; // ZMIEŃ TO!!!
        const CLIENT_ID = '1483233223013302424';
        const ADMIN_IDS = ['1192231948173709453']; // TWÓJ DISCORD ID
        let user = null, questions = [], isAdmin = false;

        // 🛡️ ANTY-CHEAT: Sprawdź czy localStorage nie został zhakowany
        function validateLocalStorage() {
            const keys = Object.keys(localStorage);
            let cheatDetected = false;
            
            keys.forEach(key => {
                if (key.includes('user_') && !key.includes('_answers') && !key.includes('_user')) {
                    console.warn('Suspicious localStorage key detected:', key);
                    cheatDetected = true;
                }
            });
            
            return !cheatDetected;
        }

        // 🛡️ WALIDACJA ODPOWIEDZI Z CHECKSUMĄ
        function saveAnswersWithChecksum(userId, answers) {
            const raw = JSON.stringify(answers);
            const checksum = btoa(raw + Date.now()).slice(0, 12);
            const data = { raw, checksum, timestamp: Date.now() };
            localStorage.setItem(`user_${userId}_answers`, JSON.stringify(data));
        }

        function loadAnswersWithChecksum(userId) {
            try {
                const data = JSON.parse(localStorage.getItem(`user_${userId}_answers`) || '{}');
                if (!data.raw || !data.checksum) return {};
                
                const expectedChecksum = btoa(data.raw + data.timestamp).slice(0, 12);
                if (expectedChecksum !== data.checksum) {
                    console.warn('Cheat detected: checksum mismatch');
                    localStorage.removeItem(`user_${userId}_answers`);
                    return {};
                }
                
                return JSON.parse(data.raw);
            } catch(e) {
                return {};
            }
        }

        // ✅ CZYŚĆ LOGIN - TYLKO JEDEN LISTENER
        document.addEventListener('DOMContentLoaded', function() {
            const discordBtn = document.getElementById('discordLogin');
            discordBtn.onclick = function(e) {
                e.preventDefault();
                e.stopPropagation();
                window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=https://dcranking.pl/jasnowidz/discord-callback.html&response_type=token&scope=identify`;
            };
            
            // Sprawdź token z URL
            const hash = window.location.hash.substring(1);
            if (hash) {
                const params = new URLSearchParams(hash);
                const token = params.get('access_token');
                if (token) {
                    fetchUserFromToken(token);
                    return;
                }
            }
            
            // Załaduj zapisanego usera
            if (validateLocalStorage()) {
                const savedUser = localStorage.getItem('jasnowidz_user');
                if (savedUser) {
                    user = JSON.parse(savedUser);
                    showDashboard();
                }
            }
        });

        function fetchUserFromToken(token) {
    fetch('https://discord.com/api/users/@me', {
        headers: {Authorization: `Bearer ${token}`}
    })
    .then(r => r.json())
    .then(data => {
        user = data;
        
        // 🆕 ZAPISUJ DANE USERA pod kluczem _user
        localStorage.setItem(`user_${user.id}_user`, JSON.stringify(user));
        localStorage.setItem('jasnowidz_user', JSON.stringify(user));
        
        showDashboard();
        window.history.replaceState({}, '', window.location.pathname);
    })
    .catch(err => {
        console.error('Discord login failed:', err);
        document.getElementById('status').textContent = 'Błąd logowania. Spróbuj ponownie.';
    });
}
        function showDashboard() {
            if (!user) return;
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('avatar').src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=128`;
            document.getElementById('username').textContent = user.username || user.global_name || 'Użytkownik';
            loadQuestions();
            updateUserStats();
        }

        function loadQuestions() {
            questions = JSON.parse(localStorage.getItem('questions') || '[]');
            renderQuestions();
        }

        function updateUserStats() {
            const userAnswers = loadAnswersWithChecksum(user.id);
            let correct = 0, total = 0;
            
            questions.forEach((q, i) => {
                if (q.correct !== undefined && userAnswers[i] !== undefined) {
                    total++;
                    if (userAnswers[i] === q.correct) correct++;
                }
            });
            
            document.getElementById('userPoints').textContent = correct;
            document.getElementById('accuracy').textContent = total > 0 ? Math.round(correct / total * 100) + '%' : '0%';
        }

        function renderQuestions() {
            document.getElementById('questionsList').innerHTML = questions.map((q, i) => {
                const now = new Date();
                const deadline = new Date(q.deadline);
                const expired = now > deadline;
                const userAnswers = loadAnswersWithChecksum(user.id);
                const userAnswer = userAnswers[i];
                const showAnswer = expired || q.correct !== undefined;
                
                return `
                    <div class="card p-8 rounded-2xl hover:shadow-2xl transition-all group">
                        <div class="text-xl font-bold mb-6 text-center pb-2 border-b border-yellow-500/50 ${expired ? 'deadline-expired' : 'deadline-active'}">
                            ${expired ? '✅ ROZSTRZYGNIĘTE' : formatTime(deadline)}
                        </div>
                        <h3 class="text-xl font-bold mb-6 text-center">${q.question}</h3>
                        <div class="space-y-3 mb-8">
                            ${q.options.map((opt, j) => {
                                const isSelected = userAnswer === j;
                                const isCorrectAnswer = showAnswer && q.correct === j;
                                const isWrongAnswer = showAnswer && isSelected && q.correct !== j;
                                
                                let classes = 'p-4 rounded-xl border-2 border-gray-600 hover:border-yellow-400 group-hover:scale-[1.02] transition-all cursor-pointer';
                                
                                if (!showAnswer && isSelected) {
                                    classes += ' bg-yellow-500/30 border-yellow-400 ring-4 ring-yellow-400/50 scale-105 shadow-lg';
                                }
                                else if (isCorrectAnswer) {
                                    classes += ' correct';
                                }
                                else if (isWrongAnswer) {
                                    classes += ' wrong';
                                }
                                else if (showAnswer) {
                                    classes += ' opacity-70 cursor-not-allowed';
                                }
                                
                                const onclick = showAnswer ? '' : `answerQuestion(${i}, ${j})`;
                                
                                return `
                                    <div class="${classes}" onclick="${onclick}">
                                        <div class="font-bold text-lg flex items-center justify-between">
                                            <span>${String.fromCharCode(65+j)}: ${opt}</span>
                                            ${!showAnswer && isSelected ? '<span class="text-yellow-800 font-bold text-sm ml-2">✓ WYBRANO</span>' : ''}
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                        ${showAnswer && userAnswer !== undefined ? `<div class="text-center p-3 rounded-xl font-bold text-xl mt-4 ${userAnswer === q.correct ? 'bg-emerald-600 text-white' : 'bg-red-600 text-white'}">Twoja: ${String.fromCharCode(65+userAnswer)}</div>` : ''}
                        ${q.correct !== undefined ? `<div class="text-center p-3 rounded-xl font-bold text-xl mt-4 bg-emerald-600 text-white">✅ Poprawna: ${String.fromCharCode(65+q.correct)}</div>` : ''}
                    </div>
                `;
            }).join('') || '<div class="col-span-full text-center py-20 text-gray-400 text-xl">Brak aktywnych pytań jasnowidza</div>';
        }

        // 🛡️ ZABEZPIECZONA FUNKCJA ODPOWIEDZI
        function answerQuestion(qid, optid) {
            const q = questions[qid];
            if (!q) return;
            
            const now = new Date();
            const deadline = new Date(q.deadline);
            
            // 🔒 BLOKADA PO DEADLINE
            if (now > deadline) {
                alert('To pytanie jest już zamknięte!');
                renderQuestions();
                return;
            }
            
            const userAnswers = loadAnswersWithChecksum(user.id);
            
            // 🔒 JEDNA ODPOWIEDŹ NA PYTANIE - BRAK ZMIAN
            if (userAnswers[qid] !== undefined) {
                alert('Odpowiedź na to pytanie już została zapisana i nie można jej zmienić!');
                return;
            }
            
            userAnswers[qid] = optid;
            saveAnswersWithChecksum(user.id, userAnswers);
            renderQuestions();
            updateUserStats();
        }

        function formatTime(date) {
            const now = new Date();
            const diff = date - now;
            if (diff < 0) return 'WYGASŁE';
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            return `${h}h ${m}m`;
        }

        // ========== ADMIN FUNCTIONS ==========
        function adminLogin() {
            if (!user || !ADMIN_IDS.includes(user.id)) {
                alert('Nie masz uprawnień do panelu admina!');
                return;
            }
            document.getElementById('adminLoginScreen').classList.remove('hidden');
        }

        function checkAdmin() {
            if (document.getElementById('adminPass').value === ADMIN_PASS) {
                document.getElementById('adminLoginScreen').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                renderAdminPanel();
            } else {
                alert('❌ BŁĘDNE HASŁO!');
                document.getElementById('adminPass').value = '';
            }
        }

        function getPlayerData() {
            const players = [];
            for (let uid in localStorage) {
                if (uid.includes('user_') && uid.includes('_answers')) {
                    try {
                        const answersData = JSON.parse(localStorage.getItem(uid));
                        const rawAnswers = JSON.parse(answersData.raw);
                        const userDataKey = uid.replace('_answers', '_user');
                        const userData = JSON.parse(localStorage.getItem(userDataKey) || '{}');
                        
                        let correctCount = 0;
                        let totalAnswered = 0;
                        for (let qid in rawAnswers) {
                            const q = questions[qid];
                            if (q && q.correct !== undefined) {
                                totalAnswered++;
                                if (rawAnswers[qid] === q.correct) correctCount++;
                            }
                        }
                        
                        if (totalAnswered > 0) {
                            players.push({
                                id: uid.replace('user_', '').replace('_answers', ''),
                                username: userData.username || 'Anonim',
                                avatar: userData.avatar || '',
                                score: correctCount,
                                total: totalAnswered,
                                accuracy: Math.round(correctCount / totalAnswered * 100)
                            });
                        }
                    } catch(e) {}
                }
            }
            return players;
        }

        function renderAdminPanel() {
            loadQuestions();
            renderAdminQuestions();
            document.getElementById('resultsDistribution').innerHTML = calculateResultsDistribution();
            renderPlayerRanking();
        }

        function renderAdminQuestions() {
            document.getElementById('adminQuestionsList').innerHTML = questions.map((q, i) => {
                const votes = {};
                for (let uid in localStorage) {
                    if (uid.includes('user_') && uid.includes('_answers')) {
                        try {
                            const answersData = JSON.parse(localStorage.getItem(uid));
                            const rawAnswers = JSON.parse(answersData.raw);
                            if (rawAnswers[i] !== undefined) {
                                votes[rawAnswers[i]] = (votes[rawAnswers[i]] || 0) + 1;
                            }
                        } catch(e) {}
                    }
                }
                return `
                    <div class="card p-8 rounded-2xl mb-8 hover:shadow-2xl">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <h4 class="text-2xl font-bold mb-2">${q.question}</h4>
                                <div class="text-lg text-gray-300">${formatTime(new Date(q.deadline))} | ${Object.values(votes).reduce((a,b)=>a+b,0)} głosów</div>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="deleteQuestion(${i})" class="bg-red-600 hover:bg-red-500 text-white px-6 py-3 rounded-xl font-bold text-lg shadow-lg hover:shadow-xl transition-all">🗑️ Usuń</button>
                            </div>
                        </div>
                        <div class="grid grid-cols-${Math.min(q.options.length, 4)} gap-4 mb-8">
                            ${q.options.map((opt, j) => `
                                <div onclick="setCorrectAnswer(${i}, ${j})" class="p-6 border-2 rounded-2xl cursor-pointer hover:shadow-xl transition-all group ${q.correct === j ? 'border-emerald-500 bg-emerald-500/20 shadow-emerald-500/50' : 'border-gray-600 hover:border-yellow-400 group-hover:scale-[1.02]'}">
                                    <div class="font-bold text-xl mb-2">${String.fromCharCode(65+j)}</div>
                                    <div class="text-lg">${opt}</div>
                                    <div class="text-sm font-bold mt-2 text-yellow-400">${votes[j] || 0} głosów</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('') || '<div class="text-center py-20 text-gray-400 text-2xl col-span-full">Brak pytań - dodaj pierwsze!</div>';
        }

        function renderPlayerRanking() {
            const players = getPlayerData();
            const totalQuestions = questions.filter(q => q.correct !== undefined).length;
            
            players.sort((a, b) => b.score - a.score);
            
            document.getElementById('playerRanking').innerHTML = players.map((player, index) => `
                <div class="card p-6 rounded-2xl hover:shadow-xl transition-all flex items-center gap-4 group">
                    <div class="w-12 h-12 rounded-full overflow-hidden ring-2 ring-yellow-400/50">
                        <img src="https://cdn.discordapp.com/avatars/${player.id}/${player.avatar}.png?size=64" 
                             alt="${player.username}" class="w-full h-full object-cover" 
                             onerror="this.src='https://via.placeholder.com/48?text=👤'">
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="font-bold text-lg truncate">${player.username}</div>
                        <div class="text-sm text-gray-400">${player.total}/${totalQuestions} • ${player.accuracy}% skuteczności</div>
                    </div>
                    <div class="text-right">
                        <div class="text-2xl font-black text-yellow-400">${player.score}/${totalQuestions}</div>
                        <div class="text-sm font-bold ${player.score === totalQuestions ? 'text-emerald-400' : 'text-gray-400'}">
                            #${index + 1}
                        </div>
                    </div>
                </div>
            `).join('') || '<div class="text-center py-12 text-gray-400 text-xl">Nikt jeszcze nie odpowiedział na pytania</div>';
        }

        function calculateResultsDistribution() {
            const players = getPlayerData();
            const totalQuestions = questions.filter(q => q.correct !== undefined).length;
            const results = {};
            
            players.forEach(p => {
                results[p.score] = (results[p.score] || 0) + 1;
            });
            
            if (totalQuestions === 0) {
                return '<div class="text-center py-20 text-gray-400 text-xl">Oznacz poprawne odpowiedzi aby zobaczyć rozkład wyników</div>';
            }
            
            const totalPlayers = players.length;
            return `
                <div class="p-10 bg-gradient-to-br from-emerald-600 via-blue-600 to-purple-600 rounded-3xl shadow-2xl">
                    <h3 class="text-4xl font-black text-white mb-8 text-center">🏆 ROZKŁAD WYNIKÓW</h3>
                    <p class="text-2xl text-yellow-300 mb-10 text-center">${totalQuestions} pytań • ${totalPlayers} graczy</p>
                    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-${Math.min(totalQuestions+1, 6)} gap-6 justify-center">
                        ${Array.from({length: totalQuestions+1}, (_, i) => `
                            <div class="p-8 bg-white/10 backdrop-blur-xl rounded-3xl text-center hover:bg-white/20 hover:scale-105 transition-all shadow-xl hover:shadow-2xl border border-white/20">
                                <div class="text-4xl font-black text-yellow-300 mb-4">${i}/${totalQuestions}</div>
                                <div class="text-3xl font-bold text-white">${results[i] || 0} osób</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function addQuestion() {
            const newQ = {
                question: document.getElementById('adminQ').value.trim(),
                options: [document.getElementById('optA').value, document.getElementById('optB').value, document.getElementById('optC').value, document.getElementById('optD').value].filter(o => o.trim()),
                deadline: document.getElementById('deadline').value,
                correct: undefined
            };
            if (newQ.question && newQ.options.length >= 2 && newQ.deadline) {
                questions.push(newQ);
                localStorage.setItem('questions', JSON.stringify(questions));
                renderAdminQuestions();
                document.getElementById('resultsDistribution').innerHTML = calculateResultsDistribution();
                renderPlayerRanking();
                clearAdminForm();
                alert('✅ Pytanie dodane!');
            } else {
                alert('❌ Wypełnij wszystkie pola!');
            }
        }

        function setCorrectAnswer(qid, optid) {
            questions[qid].correct = optid;
            localStorage.setItem('questions', JSON.stringify(questions));
            renderQuestions();
            renderAdminQuestions();
            document.getElementById('resultsDistribution').innerHTML = calculateResultsDistribution();
            renderPlayerRanking();
            updateUserStats();
        }

        function deleteQuestion(qid) {
            if (confirm('Usunąć pytanie?')) {
                questions.splice(qid, 1);
                localStorage.setItem('questions', JSON.stringify(questions));
                renderQuestions();
                renderAdminQuestions();
                document.getElementById('resultsDistribution').innerHTML = calculateResultsDistribution();
                renderPlayerRanking();
            }
        }

        function clearAdminForm() {
            document.getElementById('adminQ').value = '';
            ['optA','optB','optC','optD'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('deadline').value = '';
        }

        function closeAdmin() {
            document.getElementById('adminPanel').classList.add('hidden');
        }

        function logout() {
            localStorage.removeItem('jasnowidz_user');
            localStorage.removeItem(`user_${user?.id}_answers`);
            location.reload();
        }
    <button onclick="clearAllData()" class="fixed bottom-20 right-20 bg-red-600 text-white p-4 rounded-full text-xl z-50 shadow-2xl hover:bg-red-500">🧹 WYČYŚĆ DANE</button>
