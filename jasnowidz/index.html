<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jasnowidz Fortuny</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> body { background: linear-gradient(to right, #8b5cf6, #ec4899); } </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <!-- Login -->
    <div id="loginScreen" class="bg-white p-8 rounded-xl shadow-2xl max-w-md w-full text-center">
        <h1 class="text-3xl font-bold mb-6 text-purple-600">🔮 Jasnowidz Fortuny</h1>
        <button id="discordLogin" class="w-full bg-[#5865F2] text-white py-3 px-6 rounded-lg font-semibold hover:bg-[#4752C4] mb-4">Zaloguj Discord</button>
        <div id="status" class="text-sm text-gray-600">Kliknij żeby zagrać!</div>
    </div>

    <div id="homeScreen" class="hidden bg-white p-8 rounded-xl shadow-2xl max-w-md w-full text-center">
        <h2 class="text-2xl mb-4 text-green-600">✅ ZALOGOWANY!</h2>
        <h3 class="text-xl mb-6">Witaj <span id="username" class="font-bold"></span></h3>
        <button onclick="adminLogin()" class="bg-yellow-500 text-black py-3 px-8 rounded-lg font-bold w-full mb-4 hover:bg-yellow-400">🔐 PANEL ADMIN</button>
        <button onclick="logout()" class="bg-red-500 text-white py-2 px-4 rounded w-full mt-4 text-sm hover:bg-red-600">Wyloguj</button>
    </div>

    <!-- ADMIN LOGIN -->
    <div id="adminLoginScreen" class="hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-40">
        <div class="bg-white p-12 rounded-3xl max-w-md w-full mx-4">
            <h2 class="text-3xl font-bold text-center mb-8 text-black">🔐 PANEL ADMIN</h2>
            <input id="adminPass" type="password" placeholder="Hasło..." class="w-full p-4 text-xl rounded-2xl border-2 border-gray-300 mb-6 text-center">
            <button onclick="checkAdmin()" class="w-full bg-gradient-to-r from-yellow-500 to-yellow-600 text-black py-4 px-8 rounded-2xl font-bold text-xl hover:shadow-2xl">WEJDŹ</button>
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <div id="adminPanel" class="hidden fixed inset-0 bg-gradient-to-br from-black to-gray-900 flex items-center justify-center z-50 p-4">
        <div class="bg-white p-8 rounded-3xl max-w-4xl w-full max-h-[90vh] overflow-y-auto shadow-2xl">
            <h1 class="text-4xl font-bold text-center mb-8 text-gray-800">⚙️ PANEL ADMINISTRATORA</h1>
            
            <!-- ADD QUESTION -->
            <div class="mb-12 p-6 bg-gray-50 rounded-2xl">
                <h3 class="text-2xl font-bold mb-6">➕ DODAJ NOWE PYTANIE</h3>
                <input id="adminQ" placeholder="Pytanie jasnowidza..." class="w-full p-4 rounded-xl border mb-4 text-lg">
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <input id="optA" placeholder="Opcja A" class="p-3 rounded-xl border">
                    <input id="optB" placeholder="Opcja B" class="p-3 rounded-xl border">
                </div>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <input id="optC" placeholder="Opcja C" class="p-3 rounded-xl border">
                    <input id="optD" placeholder="Opcja D" class="p-3 rounded-xl border">
                </div>
                <input id="deadline" type="datetime-local" class="w-full p-3 rounded-xl border mb-4">
                <button onclick="addQuestion()" class="w-full bg-green-500 text-white py-3 px-6 rounded-xl font-bold hover:bg-green-600">➕ DODAJ</button>
            </div>

            <!-- QUESTIONS LIST -->
            <div id="adminQuestionsList" class="space-y-4"></div>
            <button onclick="closeAdmin()" class="w-full bg-gray-500 text-white py-3 px-6 rounded-xl font-bold mt-8 hover:bg-gray-600">🚪 WYJDŹ</button>
        </div>
    </div>

    <script>
        const ADMIN_PASS = 'cwel@123';
        const CLIENT_ID = '1483233223013302424';
        let user = null, questions = [], isAdmin = false;

        // POPRZEDNI SPOSÓB LOGOWANIA - DZIAŁAŁ!
        document.getElementById('discordLogin').onclick = () => {
            window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=https://dcranking.pl/jasnowidz/discord-callback.html&response_type=token&scope=identify`;
        };

        window.onload = () => {
            // SPRAWDŹ TOKEN Z URL
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const token = params.get('access_token');
            
            if (token) {
                fetch('https://discord.com/api/users/@me', {
                    headers: {Authorization: `Bearer ${token}`}
                }).then(r => r.json()).then(data => {
                    user = data;
                    localStorage.setItem('jasnowidz_user', JSON.stringify(user));
                    document.getElementById('username').textContent = user.username;
                    document.getElementById('loginScreen').classList.add('hidden');
                    document.getElementById('homeScreen').classList.remove('hidden');
                    window.history.replaceState({}, '', window.location.pathname);
                });
                return;
            }
            
            // AUTO LOGOWANIE Z LOCALSTORAGE
            const savedUser = localStorage.getItem('jasnowidz_user');
            if (savedUser) {
                user = JSON.parse(savedUser);
                document.getElementById('username').textContent = user.username;
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('homeScreen').classList.remove('hidden');
            }
        };

        function logout() {
            localStorage.removeItem('jasnowidz_user');
            location.reload();
        }

        // ADMIN
        function adminLogin() {
            document.getElementById('adminLoginScreen').classList.remove('hidden');
        }

        function checkAdmin() {
            if (document.getElementById('adminPass').value === ADMIN_PASS) {
                document.getElementById('adminLoginScreen').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                renderAdminQuestions();
            } else {
                alert('❌ ZŁE HASŁO!');
            }
        }

        function renderAdminQuestions() {
            questions = JSON.parse(localStorage.getItem('questions')) || [];
            document.getElementById('adminQuestionsList').innerHTML = questions.map((q, i) => {
                const votes = {};
                // policz głosy (uproszczone)
                return `
                    <div class="p-6 border rounded-xl bg-white">
                        <div class="flex justify-between mb-4">
                            <h4 class="font-bold text-xl">${q.question}</h4>
                            <div class="space-x-2">
                                <button onclick="setCorrect(${i}, 0)" class="px-3 py-1 bg-blue-500 text-white rounded text-sm ${q.correct === 0 ? 'bg-green-500' : ''}">A</button>
                                <button onclick="setCorrect(${i}, 1)" class="px-3 py-1 bg-blue-500 text-white rounded text-sm ${q.correct === 1 ? 'bg-green-500' : ''}">B</button>
                                <button onclick="setCorrect(${i}, 2)" class="px-3 py-1 bg-blue-500 text-white rounded text-sm ${q.correct === 2 ? 'bg-green-500' : ''}">C</button>
                                <button onclick="deleteQ(${i})" class="px-3 py-1 bg-red-500 text-white rounded text-sm">🗑️</button>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-2 text-sm">
                            <div>A: ${q.options[0] || ''}</div>
                            <div>B: ${q.options[1] || ''}</div>
                            <div>C: ${q.options[2] || ''}</div>
                            <div>D: ${q.options[3] || ''}</div>
                        </div>
                    </div>
                `;
            }).join('') || '<p class="text-center py-8 text-gray-500">Brak pytań</p>';
        }

        function addQuestion() {
            const newQ = {
                question: document.getElementById('adminQ').value,
                options: [
                    document.getElementById('optA').value,
                    document.getElementById('optB').value, 
                    document.getElementById('optC').value,
                    document.getElementById('optD').value
                ].filter(o => o),
                deadline: document.getElementById('deadline').value,
                correct: undefined
            };
            if (newQ.question && newQ.options.length >= 2) {
                questions.push(newQ);
                localStorage.setItem('questions', JSON.stringify(questions));
                renderAdminQuestions();
                // wyczysc formularz
                document.getElementById('adminQ').value = '';
                ['optA','optB','optC','optD'].forEach(id => document.getElementById(id).value = '');
            }
        }

        function setCorrect(i, opt) {
            questions[i].correct = opt;
            localStorage.setItem('questions', JSON.stringify(questions));
            renderAdminQuestions();
        }

        function deleteQ(i) {
            questions.splice(i, 1);
            localStorage.setItem('questions', JSON.stringify(questions));
            renderAdminQuestions();
        }

        function closeAdmin() {
            document.getElementById('adminPanel').classList.add('hidden');
        }
    </script>
</body>
</html>
