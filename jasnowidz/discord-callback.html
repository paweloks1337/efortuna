<!DOCTYPE html>
<html>
<head>
    <title>Przekierowuję...</title>
    <script>
        // Pobierz token z URL i zapisz
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const token = params.get('access_token');
        
        if (token) {
            // ZAPISZ UŻYTKOWNIKA NATYCHMIAST
            fetch('https://discord.com/api/users/@me', {
                headers: { Authorization: `Bearer ${token}` }
            }).then(r => r.json()).then(user => {
                localStorage.setItem('jasnowidz_user', JSON.stringify(user));
                // PRZEKIERUJ NA GŁÓWNA STRONĘ
                window.location.href = 'https://dcranking.pl/jasnowidz/';
            }).catch(() => {
                window.location.href = 'https://dcranking.pl/jasnowidz/';
            });
        } else {
            window.location.href = 'https://dcranking.pl/jasnowidz/';
        }
    </script>
</head>
<body style="text-align:center; padding:50px; font-family:Arial;">
    <h1>🔮 Przekierowuję do Jasnowidza...</h1>
    <p>Token zapisany - ładowanie użytkownika (2s)</p>
</body>
</html>
