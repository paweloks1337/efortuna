<!DOCTYPE html>
<html lang="pl">
<head>

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>🏆 Mistrzostwa Typerów Discord</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
:root {
  --bg:        #0A0A0F;
  --surface:   #13131D;
  --surface2:  #1C1C2E;
  --border:    rgba(255,214,10,0.12);
  --gold:      #FFD60A;
  --gold-dim:  rgba(255,214,10,0.15);
  --gold-glow: rgba(255,214,10,0.35);
  --green:     #00E676;
  --green-dim: rgba(0,230,118,0.12);
  --text:      #E8E8F0;
  --muted:     #6B6B80;
  --radius:    12px;
  --radius-lg: 20px;
}

/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── BACKGROUND ATMOSPHERE ── */
body::before {
  content: '';
  position: fixed;
  top: -200px; left: 50%;
  transform: translateX(-50%);
  width: 800px; height: 600px;
  background: radial-gradient(ellipse at center, rgba(255,214,10,0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ── NAV ── */
nav {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  justify-content: center;
  gap: 4px;
  padding: 10px 16px;
  background: rgba(10,10,15,0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}

nav a {
  color: var(--muted);
  text-decoration: none;
  font-size: 0.82rem;
  font-weight: 600;
  padding: 7px 14px;
  border-radius: 8px;
  transition: color 0.2s, background 0.2s;
  white-space: nowrap;
}
nav a:hover {
  color: var(--gold);
  background: var(--gold-dim);
}
nav a.active {
  color: var(--gold);
  background: var(--gold-dim);
}

/* ── HERO ── */
.hero {
  text-align: center;
  padding: 40px 20px 28px;
  position: relative;
  z-index: 1;
}

.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gold);
  background: var(--gold-dim);
  border: 1px solid var(--border);
  padding: 5px 14px;
  border-radius: 999px;
  margin-bottom: 16px;
}

.hero-eyebrow .dot {
  width: 6px; height: 6px;
  background: var(--gold);
  border-radius: 50%;
  animation: blink 2s ease-in-out infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.hero h1 {
  font-family: 'Rajdhani', sans-serif;
  font-size: clamp(1.8rem, 5vw, 3rem);
  font-weight: 700;
  letter-spacing: 0.02em;
  line-height: 1.1;
  color: #fff;
}

.hero h1 span {
  color: var(--gold);
}

/* ── CONTROLS ── */
.controls {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 10px;
  max-width: 860px;
  margin: 0 auto 24px;
  padding: 0 16px;
  position: relative;
  z-index: 1;
}

.search-wrap {
  flex: 1;
  min-width: 180px;
  position: relative;
}

.search-wrap svg {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  pointer-events: none;
}

#search {
  width: 100%;
  padding: 10px 12px 10px 38px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

#search::placeholder { color: var(--muted); }
#search:focus {
  border-color: rgba(255,214,10,0.5);
  box-shadow: 0 0 0 3px rgba(255,214,10,0.08);
}

.select-wrap {
  position: relative;
}

.select-wrap svg {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
  color: var(--muted);
}

select {
  appearance: none;
  -webkit-appearance: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 0.9rem;
  font-weight: 500;
  padding: 10px 34px 10px 14px;
  cursor: pointer;
  outline: none;
  transition: border-color 0.2s;
}

select:focus { border-color: rgba(255,214,10,0.5); }

/* ── STATS BAR ── */
.stats-bar {
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
  max-width: 860px;
  margin: 0 auto 20px;
  padding: 0 16px;
  position: relative;
  z-index: 1;
}

.stat-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 7px 16px;
  font-size: 0.82rem;
  color: var(--muted);
}

.stat-pill strong {
  color: var(--text);
  font-weight: 600;
}

/* ── TABLE CONTAINER ── */
.table-wrap {
  max-width: 860px;
  margin: 0 auto 60px;
  padding: 0 16px;
  position: relative;
  z-index: 1;
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 0.5s, transform 0.5s;
}

.table-wrap.show {
  opacity: 1;
  transform: translateY(0);
}

/* ── TABLE ── */
.ranking-table {
  width: 100%;
  border-collapse: collapse;
}

.ranking-table thead tr {
  border-bottom: 1px solid var(--border);
}

.ranking-table th {
  padding: 10px 16px;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  text-align: left;
}

.ranking-table th:nth-child(3) { text-align: center; }
.ranking-table th:nth-child(4) { text-align: right; }

/* ── ROWS ── */
.ranking-table tbody tr {
  border-bottom: 1px solid rgba(255,255,255,0.04);
  transition: background 0.15s;
  cursor: default;
}

.ranking-table tbody tr:hover {
  background: var(--surface2);
}

.ranking-table td {
  padding: 13px 16px;
  font-size: 0.93rem;
  vertical-align: middle;
}

/* Rank cell */
.ranking-table td.rank {
  width: 48px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--muted);
}

.rank-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px; height: 28px;
  border-radius: 8px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
}

.rank-1 .rank-badge {
  background: linear-gradient(135deg, #FFD60A, #FF9A00);
  color: #000;
  box-shadow: 0 0 14px rgba(255,214,10,0.5);
}

.rank-2 .rank-badge {
  background: linear-gradient(135deg, #C0C0C0, #888);
  color: #000;
  box-shadow: 0 0 10px rgba(192,192,192,0.3);
}

.rank-3 .rank-badge {
  background: linear-gradient(135deg, #CD7F32, #8B4513);
  color: #fff;
  box-shadow: 0 0 10px rgba(205,127,50,0.3);
}

/* Top 3 row highlight */
.rank-1, .rank-2, .rank-3 {
  background: rgba(255,214,10,0.025);
}

/* Nick cell */
.ranking-table td.nick {
  font-weight: 600;
  color: #fff;
  cursor: pointer;
  white-space: nowrap;
}

.nick-inner {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: color 0.15s;
}

.nick-inner:hover { color: var(--gold); }

.nick-avatar {
  width: 30px; height: 30px;
  border-radius: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 0.8rem;
  color: var(--muted);
  font-weight: 700;
  flex-shrink: 0;
  font-family: 'Rajdhani', sans-serif;
}

.rank-1 .nick-avatar { border-color: rgba(255,214,10,0.4); color: var(--gold); background: rgba(255,214,10,0.1); }
.rank-2 .nick-avatar { border-color: rgba(192,192,192,0.4); color: #C0C0C0; background: rgba(192,192,192,0.1); }
.rank-3 .nick-avatar { border-color: rgba(205,127,50,0.4); color: #CD7F32; background: rgba(205,127,50,0.1); }

/* Coupons cell */
.ranking-table td.coupons {
  text-align: center;
  color: var(--muted);
  font-size: 0.88rem;
  white-space: nowrap;
}

.coupon-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 3px 10px;
  font-size: 0.8rem;
  font-weight: 500;
}

/* Points cell */
.ranking-table td.points {
  text-align: right;
  font-family: 'Rajdhani', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--green);
  white-space: nowrap;
}

.rank-1 td.points { color: var(--gold); }

/* ── LOADER ── */
#loader {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  z-index: 9999;
  flex-direction: column;
  gap: 16px;
}

#loader.hidden { display: none; }

.loader-ring {
  width: 48px; height: 48px;
  border-radius: 50%;
  border: 3px solid var(--surface2);
  border-top-color: var(--gold);
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loader-label {
  font-size: 0.8rem;
  color: var(--muted);
  letter-spacing: 0.08em;
}

/* ── POPUP ── */
.popup-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  z-index: 99999;
  visibility: hidden;
  opacity: 0;
  transition: opacity 0.25s, visibility 0.25s;
}

@media (min-width: 600px) {
  .popup-overlay {
    align-items: center;
  }
}

.popup-overlay.active {
  visibility: visible;
  opacity: 1;
}

.popup-sheet {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  padding: 28px 20px 32px;
  width: 100%;
  max-width: 500px;
  max-height: 85vh;
  overflow-y: auto;
  transform: translateY(20px);
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
}

@media (min-width: 600px) {
  .popup-sheet {
    border-radius: var(--radius-lg);
    transform: scale(0.96);
    max-height: 80vh;
  }
}

.popup-overlay.active .popup-sheet {
  transform: translateY(0) scale(1);
}

/* drag handle */
.popup-handle {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 999px;
  margin: 0 auto 20px;
}

@media (min-width: 600px) {
  .popup-handle { display: none; }
}

.popup-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  gap: 12px;
}

.popup-nick {
  font-family: 'Rajdhani', sans-serif;
  font-size: 1.5rem;
  font-weight: 700;
  color: #fff;
}

.popup-close {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.15s, background 0.15s;
  flex-shrink: 0;
}

.popup-close:hover { color: #fff; background: #2A2A3E; }

.popup-sort {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
}

.sort-btn {
  flex: 1;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--muted);
  font-family: 'Inter', sans-serif;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}

.sort-btn.active {
  background: var(--gold-dim);
  border-color: rgba(255,214,10,0.4);
  color: var(--gold);
}

/* coupon items */
.coupon-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 8px;
  opacity: 0;
  transform: translateY(8px);
  animation: slideUp 0.3s ease forwards;
  gap: 10px;
}

@keyframes slideUp {
  to { opacity: 1; transform: translateY(0); }
}

.coupon-item.is-best {
  border-color: rgba(255,214,10,0.35);
  background: rgba(255,214,10,0.06);
}

.coupon-item.is-best .coupon-pts {
  color: var(--gold);
}

.coupon-left { flex: 1; min-width: 0; }

.coupon-date {
  font-size: 0.78rem;
  color: var(--muted);
  margin-bottom: 2px;
}

.coupon-pts {
  font-family: 'Rajdhani', sans-serif;
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--green);
}

.best-label {
  font-size: 0.68rem;
  background: var(--gold-dim);
  color: var(--gold);
  border: 1px solid rgba(255,214,10,0.3);
  border-radius: 999px;
  padding: 2px 8px;
  font-weight: 600;
  letter-spacing: 0.05em;
  white-space: nowrap;
}

.coupon-open {
  padding: 7px 14px;
  border-radius: 8px;
  background: var(--gold);
  border: none;
  color: #000;
  font-family: 'Inter', sans-serif;
  font-size: 0.8rem;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity 0.15s, transform 0.15s;
  flex-shrink: 0;
}

.coupon-open:hover { opacity: 0.85; transform: scale(0.97); }

.popup-footer {
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.popup-total-label {
  font-size: 0.8rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.popup-total-pts {
  font-family: 'Rajdhani', sans-serif;
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--green);
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 20px;
  border-radius: 999px;
  font-size: 0.85rem;
  font-weight: 500;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  z-index: 99998;
  white-space: nowrap;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}

.empty-state svg {
  margin-bottom: 12px;
  opacity: 0.4;
}

/* ── MOBILE OVERFLOW FIX ── */
@media (max-width: 500px) {
  .ranking-table td, .ranking-table th { padding: 11px 10px; }
  .ranking-table th:first-child { padding-left: 12px; }
  .ranking-table td.rank { width: 40px; }
  .nick-avatar { display: none; }
}
</style>
</head>
<body>

<!-- Loader -->
<div id="loader">
  <div class="loader-ring"></div>
  <div class="loader-label">Ładowanie rankingu…</div>
</div>

<!-- Nav -->
<nav>
  <a href="index.html" class="active">🏆 Ranking</a>
  <a href="kalkulator.html">📊 Kalkulator</a>
  <a href="kupony.html">🧾 Kupony</a>
  <a href="zasady.html">📖 Zasady</a>
</nav>

<!-- Hero -->
<div class="hero">
  <div class="hero-eyebrow">
    <span class="dot"></span>
    Discord Community
  </div>
  <h1>Mistrzostwa<br><span>Typerów</span></h1>
</div>

<!-- Controls -->
<div class="controls">
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="search" placeholder="Szukaj gracza…" autocomplete="off" />
  </div>
  <div class="select-wrap">
    <select id="month-select">
      <option value="maj">Maj</option>
      <option value="kwiecien">Kwiecień</option>
      <option value="marzec">Marzec</option>
      <option value="luty">Luty</option>
      <option value="styczen">Styczeń</option>
      <option value="grudzien">Grudzień</option>
    </select>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="m6 9 6 6 6-6"/>
    </svg>
  </div>
</div>

<!-- Stats bar -->
<div class="stats-bar">
  <div class="stat-pill">👥 Typerzy <strong id="count">—</strong></div>
  <div class="stat-pill">💰 Suma <strong id="sum">—</strong> pkt</div>
  <div class="stat-pill">📊 Średnia <strong id="avg">—</strong> pkt</div>
</div>

<!-- Table -->
<div class="table-wrap" id="table-wrap">
  <table class="ranking-table" id="ranking">
    <thead>
      <tr>
        <th>#</th>
        <th>Gracz</th>
        <th style="text-align:center">Kupony</th>
        <th style="text-align:right">Punkty</th>
      </tr>
    </thead>
    <tbody id="ranking-body"></tbody>
  </table>
</div>

<!-- Popup -->
<div id="popup" class="popup-overlay">
  <div class="popup-sheet">
    <div class="popup-handle"></div>
    <div class="popup-header">
      <div class="popup-nick" id="popup-nick"></div>
      <button class="popup-close" onclick="closePopup()" aria-label="Zamknij">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div class="popup-sort">
      <button class="sort-btn active" data-sort="date" onclick="setSortType('date', this)">📅 Data</button>
      <button class="sort-btn" data-sort="points" onclick="setSortType('points', this)">🏆 Punkty</button>
    </div>
    <div id="popup-links"></div>
    <div class="popup-footer">
      <div>
        <div class="popup-total-label">Łącznie</div>
        <div class="popup-total-pts" id="popup-total"></div>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const CSV_URLS = {
  maj: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQg5KetOj1gI-RwW7c8jForGl7QHTA2EFBjar_7usr594aCldQIiNqzglkItznWYJBBX8lISZ_RK4yL/pub?output=csv",
  kwiecien: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSH66B29eSQCx3n4azrAONb4DnOv80o0OLpyb3u2d8oRKATfJp6kOe7ONb3n0MEwjLoQobdaEQKbuQ5/pub?output=csv",
  marzec: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTsopL8OBdIkFkCdGLo-_n8YewObXzEvVHQ9K0PXy3ANcxxJ2B6krxvxPPpHex66ut4Ut8hvARMzmh1/pub?output=csv",

function parseCSV(t) {
  return t.trim().split(/\r?\n/).map(l =>
    l.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/).map(x => x.replace(/^"|"$/g, ''))
  );
}
