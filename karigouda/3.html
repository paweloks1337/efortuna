<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularz zgłoszeniowy Legia Warszawa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #004225 0%, #006400 50%, #008000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .formularz {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 66, 37, 0.3);
            width: 100%;
            max-width: 500px;
            backdrop-filter: blur(10px);
        }

        .formularz h1 {
            background: linear-gradient(135deg, #DC143C, #B22222);
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 15px;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(220, 20, 60, 0.4);
        }

        .pole {
            margin-bottom: 25px;
            position: relative;
        }

        .pole label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #004225;
            font-size: 16px;
        }

        .pole input,
        .pole textarea {
            width: 100%;
            height: 50px;
            padding: 0 20px;
            border: 2px solid #E0E0E0;
            border-radius: 12px;
            font-size: 16px;
            background: white;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .pole textarea {
            height: 150px;
            resize: vertical;
            padding: 20px;
        }

        .pole input:focus,
        .pole textarea:focus {
            outline: none;
            border-color: #DC143C;
            box-shadow: 0 0 0 3px rgba(220, 20, 60, 0.1);
        }

        .zalacznik::before {
            content: '☁️';
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            pointer-events: none;
        }

        button {
            width: 100%;
            height: 55px;
            background: linear-gradient(135deg, #DC143C, #B22222);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 8px 20px rgba(220, 20, 60, 0.4);
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(220, 20, 60, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        @media (max-width: 480px) {
            .formularz {
                padding: 30px 25px;
                margin: 10px;
            }
            
            .formularz h1 {
                font-size: 24px;
                padding: 18px;
            }
        }
    </style>
</head>
<body>
    <form class="formularz" action="#" method="POST">
        <h1>Formularz zgłoszeniowy</h1>
        
        <div class="pole">
            <label>Imię i nazwisko</label>
            <input type="text" name="imie" required>
        </div>
        
        <div class="pole">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>
        
        <div class="pole">
            <label>Numer telefonu</label>
            <input type="tel" name="telefon" required>
        </div>
        
        <div class="pole zalacznik">
            <label>Załącz paragon</label>
            <input type="file" name="paragon" accept="image/*,.pdf">
        </div>
        
        <div class="pole">
            <label>Napisz dlaczego chcesz Dzień z Czystą Energią</label>
            <textarea name="wiadomosc" placeholder="Opisz swoje motywy..." required></textarea>
        </div>
        
        <button type="submit">Prześlij</button>
    </form>
</body>
</html>
