<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Typer F1</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
background:#111;
color:#FFD700;
font-family:Poppins;
text-align:center;
margin:0;
}

h1{
margin:20px 0;
}

.container{
max-width:850px;
margin:auto;
background:#1a1a1a;
padding:20px;
border-radius:12px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #333;
}

.nick{
color:white;
font-weight:600;
}

.points{
color:#00ff88;
font-weight:700;
text-align:right;
}

#search{
padding:10px;
border-radius:8px;
border:2px solid gold;
background:black;
color:gold;
margin-bottom:15px;
}

</style>
</head>

<body>

<h1>🏎️ Typer F1</h1>

<input id="search" placeholder="Szukaj nicku">

<div class="container">

<table id="ranking">

<thead>
<tr>
<th>#</th>
<th>Nick Discord</th>
<th>Nick Fortuna</th>
<th style="text-align:right">Suma PKT</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script>

const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vRp2hT2oTmlau_LscwJn__KzOn0iy9WBofcfPbHRramcAHUuLyL3p0PfgKivra049MXaUiPtFc2TvHN/pub?output=csv"


function parseCSV(text){

const rows=[]
const lines=text.split(/\r?\n/)

lines.forEach(line=>{

const result=[]
let current=""
let insideQuotes=false

for(let i=0;i<line.length;i++){

const char=line[i]

if(char=='"'){
insideQuotes=!insideQuotes
}

else if(char=="," && !insideQuotes){
result.push(current)
current=""
}

else{
current+=char
}

}

result.push(current)

rows.push(result)

})

return rows

}


function parseTime(str){

if(!str) return Infinity

str=str.replace(" ","T")

return Date.parse(str)

}


async function loadRanking(){

const res=await fetch(CSV_URL)
const txt=await res.text()

const rows=parseCSV(txt)

const head=rows[0].map(x=>x.toLowerCase())

const timeCol=head.findIndex(h=>h.includes("sygnatura"))
const discordCol=head.findIndex(h=>h.includes("discord"))
const fortunaCol=head.findIndex(h=>h.includes("fortuna"))
const pointsCol=head.findIndex(h=>h.includes("suma"))

const players={}

rows.slice(1).forEach(r=>{

const nick=(r[discordCol]||"").trim()
if(!nick) return

const fortuna=(r[fortunaCol]||"").trim()

const pts=parseFloat((r[pointsCol]||"0").replace(",","."))
const time=parseTime(r[timeCol])

if(!players[nick]){

players[nick]={
punkty:0,
time:time,
fortuna:fortuna
}

}

players[nick].punkty+=pts

if(time<players[nick].time){
players[nick].time=time
}

if(!players[nick].fortuna && fortuna){
players[nick].fortuna=fortuna
}

})

const list=Object.entries(players).map(([nick,v])=>({nick,...v}))

list.sort((a,b)=>{

if(b.punkty!==a.punkty){
return b.punkty-a.punkty
}

return a.time-b.time

})

render(list)

}


function render(list){

const tbody=document.querySelector("#ranking tbody")

tbody.innerHTML=""

list.forEach((p,i)=>{

const tr=document.createElement("tr")

tr.innerHTML=`
<td>${i+1}</td>
<td class="nick">${p.nick}</td>
<td>${p.fortuna||""}</td>
<td class="points">${Math.round(p.punkty)}</td>
`

tbody.appendChild(tr)

})

}


document.getElementById("search").addEventListener("input",e=>{

const q=e.target.value.toLowerCase()

document.querySelectorAll("#ranking tbody tr").forEach(tr=>{

const nick=tr.children[1].textContent.toLowerCase()

tr.style.display = nick.includes(q) ? "" : "none"

})

})

loadRanking()

</script>

</body>
</html>
